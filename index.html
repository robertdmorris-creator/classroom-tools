<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classroom Tools: Smartboard Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Nunito and Fredoka One for that "Game" feel -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        display: ['"Fredoka One"', 'cursive'],
                    },
                    colors: {
                        paper: '#ffffff',
                        crayon: {
                            blue: '#3b82f6',
                            yellow: '#fbbf24',
                            green: '#22c55e',
                            red: '#ef4444',
                            purple: '#a855f7',
                            orange: '#f97316',
                            pink: '#ec4899',
                            teal: '#14b8a6'
                        },
                        monster: {
                            a: '#60a5fa', // Blue monster
                            b: '#4ade80', // Green monster
                            c: '#fb923c'  // Orange monster
                        }
                    },
                    boxShadow: {
                        'cartoon': '4px 4px 0px 0px rgba(0,0,0,0.15)',
                        'cartoon-hover': '6px 6px 0px 0px rgba(0,0,0,0.2)',
                        'cartoon-active': '2px 2px 0px 0px rgba(0,0,0,0.2)',
                        'inner-lg': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                        'pop-in': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                        'chew': 'chew 0.4s ease-in-out',
                        'float': 'float 3s ease-in-out infinite',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.5)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        chew: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(0.95) rotate(2deg)' },
                            '75%': { transform: 'scale(1.05) rotate(-2deg)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #fef3c7 100%);
            color: #1e293b;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            /* Disable selection globally for better touch feel */
            user-select: none;
            -webkit-user-select: none;
        }
        
        #app-container:fullscreen {
            background: linear-gradient(135deg, #e0f2fe 0%, #fef3c7 100%);
            width: 100vw;
            height: 100vh;
            overflow-y: hidden; /* Lock scroll in FS */
        }

        .fun-panel {
            background: white;
            border-radius: 20px;
            border: 3px solid #e2e8f0;
            box-shadow: 0 8px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .btn-cartoon {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            cursor: pointer;
        }
        .btn-cartoon:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,0.1);
        }
        .btn-cartoon:active {
            transform: translateY(2px);
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; border: 3px solid white; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }

        /* Loader */
        .loader {
            width: 60px; height: 60px;
            border: 8px solid #f3f3f3; border-top: 8px solid #3b82f6;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Dragging visuals */
        .dragging { opacity: 0.3; }
        
        /* Optimized Touch Dragging */
        .touch-dragging {
            position: fixed; 
            z-index: 2147483647;
            pointer-events: none;
            opacity: 0.9; 
            transform: scale(1.15) rotate(-3deg); /* Bigger pop */
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: auto; height: auto;
        }
        
        /* Monster Dropzones */
        .dropzone-active .monster-mouth { 
            height: 70px !important; /* Bigger mouth */
            border-radius: 40px !important;
            background-color: #374151 !important;
        }
        .dropzone-active .monster-face { transform: scale(1.05); }
        .dropzone.chewing { animation: chew 0.5s ease-in-out; }

        .student-card-emoji { font-size: 3rem; line-height: 1; }
        .viewport-fullscreen {
            position: fixed !important; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            background: linear-gradient(135deg, #e0f2fe 0%, #fef3c7 100%);
            display: flex; flex-direction: column;
        }
        .viewport-fullscreen #tool-display { border-radius: 0; border: none; box-shadow: none; background: rgba(255,255,255,0.9); }
        
        /* Meter Bar */
        .meter-fill { transition: width 0.1s linear, background-color 0.2s ease; }
        
        /* Smartboard Tweaks */
        input:focus { outline: none; }
    </style>
</head>
<body class="h-screen min-h-screen font-sans antialiased overflow-hidden text-slate-800 selection:bg-crayon-yellow selection:text-slate-900">

    <div id="app-container" class="relative flex flex-col h-full z-10">

        <!-- Header / Nav -->
        <header class="flex-shrink-0 px-4 pt-2 pb-2">
            <div class="fun-panel px-3 py-2 flex items-center justify-between gap-2 md:gap-4">
                <div class="flex items-center gap-3 px-1 flex-shrink-0">
                    <div class="p-2 bg-crayon-blue rounded-xl shadow-cartoon text-white transform -rotate-3 hidden md:block">
                        <i data-lucide="backpack" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <h1 class="font-display text-2xl md:text-3xl tracking-tight text-slate-700 leading-none">Class<span class="text-crayon-blue">Tools</span></h1>
                    </div>
                </div>

                <!-- Navigation Tabs -->
                <nav id="tool-nav" class="flex gap-2 overflow-x-auto no-scrollbar mx-2 flex-grow justify-start md:justify-center px-1">
                    <!-- Buttons injected via JS -->
                </nav>

                <div class="flex items-center gap-2 flex-shrink-0">
                    <button id="fullscreen-btn" class="p-3 md:p-4 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors" title="Toggle Fullscreen">
                        <i data-lucide="maximize" class="w-6 h-6 md:w-8 md:h-8"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Tool Area - FLEX GROW to fill screen -->
        <main class="flex-grow px-4 pb-4 pt-1 min-h-0 flex flex-col">
            <div id="tool-display" class="fun-panel flex-grow w-full relative overflow-hidden flex flex-col bg-white/80 backdrop-blur-sm transition-all h-full">
                 <div class="flex flex-col items-center justify-center h-full text-center">
                     <span class="loader mb-6"></span>
                     <p class="text-3xl font-bold text-slate-400 animate-pulse">Loading Smartboard...</p>
                 </div>
            </div>
        </main>
    </div>

    <!-- Firebase and Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuration & State ---
        const appState = {
            userId: null,
            isAuthReady: false,
            activeTool: 'lunchChoice',
            students: [],
            lunchColumns: null,
            lunchMenu: { choice1Menu: '', choice2Menu: '' },
            bracket: null,
            podium: null,
            emojiMap: {},
            timerInterval: null
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "DEMO", authDomain: "DEMO", projectId: "DEMO" };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'classroom-tools-smartboard';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const toolDisplay = document.getElementById('tool-display');
        const toolNav = document.getElementById('tool-nav');
        
        // Kid-friendly Emojis
        const AVATARS = [
            '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🦄','🐞','🦖','🐳','🐙','🦋',
            '🐝','🐢','🦎','🦒','🦓','🐘','🦛','🦏','🐪','🦙','🦘','🦡','🦢','🦜','🦩','🦚','🦉','🐊','🦈','🐬'
        ];

        // Food Emoji Dictionary
        const FOOD_EMOJIS = {
            'pizza': '🍕', 'burger': '🍔', 'hotdog': '🌭', 'fries': '🍟', 'taco': '🌮', 'burrito': '🌯',
            'sandwich': '🥪', 'salad': '🥗', 'spaghetti': '🍝', 'sushi': '🍣', 'chicken': '🍗', 'steak': '🥩',
            'egg': '🍳', 'pancake': '🥞', 'waffle': '🧇', 'bacon': '🥓', 'pretzel': '🥨', 'bagel': '🥯',
            'cheese': '🧀', 'soup': '🥣', 'popcorn': '🍿', 'cookie': '🍪', 'cake': '🍰', 'cupcake': '🧁',
            'donut': '🍩', 'ice cream': '🍦', 'chocolate': '🍫', 'candy': '🍬', 'apple': '🍎', 'banana': '🍌',
            'grapes': '🍇', 'watermelon': '🍉', 'orange': '🍊', 'strawberry': '🍓', 'cherry': '🍒', 'corn': '🌽',
            'carrot': '🥕', 'broccoli': '🥦', 'bread': '🍞', 'milk': '🥛', 'juice': '🧃', 'water': '💧'
        };

        function randomizeEmojis() {
            if (appState.students.length > 0) {
                appState.students.forEach(s => {
                    appState.emojiMap[s.id] = AVATARS[Math.floor(Math.random() * AVATARS.length)];
                });
            }
        }

        function getStudentEmoji(student) {
            if (appState.emojiMap[student.id]) return appState.emojiMap[student.id];
            let hash = 0;
            const name = student.name;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            const emoji = AVATARS[Math.abs(hash) % AVATARS.length];
            appState.emojiMap[student.id] = emoji;
            return emoji;
        }

        // Tool Definitions
        const tools = {
            lunchChoice: { name: 'Lunch Feed', icon: 'utensils', color: 'bg-crayon-green', render: renderLunchChoice },
            noiseMeter: { name: 'Quiet Critter', icon: 'mic', color: 'bg-crayon-pink', render: renderNoiseMeter },
            timer: { name: 'Timer', icon: 'timer', color: 'bg-crayon-red', render: renderTimer },
            classRoster: { name: 'Roster', icon: 'users', color: 'bg-crayon-blue', render: renderClassRoster },
            studentSelector: { name: 'Picker', icon: 'dices', color: 'bg-crayon-purple', render: renderStudentSelector },
            tournamentBracket: { name: 'Bracket', icon: 'trophy', color: 'bg-crayon-yellow', render: renderTournamentBracket },
            hangman: { name: 'Hangman', icon: 'gamepad-2', color: 'bg-crayon-orange', render: renderHangman },
        };

        // --- Initialization ---

        function init() {
            renderNav();
            setupFullscreen();
            
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    appState.userId = user.uid;
                    appState.isAuthReady = true;
                    await initializeRosterIfNeeded();
                    setupStudentListener();
                    renderActiveTool();
                }
            });

            (async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Auth failed:", error);
                    fallbackToLocal();
                }
            })();
            setTimeout(() => { if (!appState.isAuthReady) fallbackToLocal(); }, 3500);
        }

        function fallbackToLocal() {
            if (appState.isAuthReady) return;
            console.warn("Using local mode");
            appState.isAuthReady = true;
            appState.students = ['Skylar', 'Terrell', 'DJ', 'Joshua', 'Cody', 'Leon', 'Alisha', 'Miracle'].map((n, i) => ({ id: `loc-${i}`, name: n, isPresent: true }));
            renderActiveTool();
        }

        async function initializeRosterIfNeeded() {
            if (!appState.userId) return;
            const settingsRef = doc(db, `artifacts/${appId}/users/${appState.userId}/settings`, 'roster');
            try {
                const snap = await getDoc(settingsRef);
                if (!snap.exists() || !snap.data().initialized) {
                    const studentsRef = collection(db, `artifacts/${appId}/users/${appState.userId}/students`);
                    const existing = await getDocs(studentsRef);
                    existing.forEach(d => deleteDoc(d.ref));
                    const defaults = ['Skylar', 'Terrell', 'DJ', 'Joshua', 'Cody', 'Leon', 'Alisha', 'Miracle'];
                    await Promise.all(defaults.map(name => addDoc(studentsRef, { name, isPresent: true })));
                    await setDoc(settingsRef, { initialized: true });
                }
            } catch (e) { console.error("Roster init error", e); }
        }

        function setupStudentListener() {
            if (!appState.userId) return;
            const q = collection(db, `artifacts/${appId}/users/${appState.userId}/students`);
            onSnapshot(q, (snap) => {
                appState.students = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.name.localeCompare(b.name));
                if (Object.keys(appState.emojiMap).length === 0) randomizeEmojis();
                if (['classRoster', 'studentSelector', 'lunchChoice'].includes(appState.activeTool)) renderActiveTool();
            }, (err) => console.error("Snapshot error", err));
        }

        // --- Core UI Functions ---

        function renderNav() {
            toolNav.innerHTML = '';
            Object.entries(tools).forEach(([id, tool]) => {
                const btn = document.createElement('button');
                const isActive = appState.activeTool === id;
                btn.className = `
                    btn-cartoon flex items-center justify-center gap-2 px-4 py-3 md:px-6 rounded-2xl text-base md:text-xl font-bold transition-all whitespace-nowrap
                    ${isActive 
                        ? `${tool.color} text-white shadow-cartoon` 
                        : 'bg-white text-slate-500 hover:bg-slate-50 border-slate-100'}
                `;
                btn.innerHTML = `<i data-lucide="${tool.icon}" class="w-5 h-5 md:w-6 md:h-6"></i> <span class="hidden md:inline">${tool.name}</span>`;
                btn.onclick = () => {
                    clearInterval(appState.timerInterval);
                    appState.activeTool = id;
                    renderNav();
                    renderActiveTool();
                };
                toolNav.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderActiveTool() {
            if (!appState.isAuthReady) return;
            const tool = tools[appState.activeTool];
            if (tool) tool.render();
            lucide.createIcons();
        }

        // --- Tool: Lunch Choice (Optimized for Smartboard) ---

        function renderLunchChoice() {
            if (!appState.lunchColumns) {
                appState.lunchColumns = {
                    unselected: [...appState.students.filter(s => s.isPresent)],
                    choice1: [], choice2: [], choice3: []
                };
            } else {
                const allIds = new Set(appState.students.map(s => s.id));
                ['unselected', 'choice1', 'choice2', 'choice3'].forEach(k => {
                    appState.lunchColumns[k] = appState.lunchColumns[k].filter(s => allIds.has(s.id));
                });
                const currentTrackedIds = new Set([
                    ...appState.lunchColumns.unselected, ...appState.lunchColumns.choice1, ...appState.lunchColumns.choice2, ...appState.lunchColumns.choice3
                ].map(s => s.id));
                appState.students.forEach(s => {
                    if (s.isPresent && !currentTrackedIds.has(s.id)) appState.lunchColumns.unselected.push(s);
                });
            }

            const cols = appState.lunchColumns;
            const menu = appState.lunchMenu;
            const total = cols.choice1.length + cols.choice2.length + cols.choice3.length + cols.unselected.length;
            const isComplete = cols.unselected.length === 0 && total > 0;

            const makeDraggable = (student, colId) => `
                <div id="st-${student.id}" draggable="true" 
                     data-id="${student.id}" data-col="${colId}"
                     style="touch-action: none;"
                     class="draggable-item bg-white border-b-4 border-slate-200 p-3 md:p-4 rounded-2xl cursor-grab active:cursor-grabbing shadow-sm hover:shadow-md hover:-translate-y-1 transition-all animate-pop-in select-none flex flex-col items-center w-36 md:w-44 m-2">
                    <div class="text-5xl md:text-6xl pointer-events-none transform transition-transform">${getStudentEmoji(student)}</div>
                    <div class="font-bold text-slate-700 text-base md:text-xl text-center leading-tight pointer-events-none truncate w-full mt-2">${student.name}</div>
                </div>`;

            const monsterTemplate = (id, color, eyeColor, title, items, isInput = false, placeholder = "") => {
                let currentEmoji = '';
                if (isInput) {
                    const text = menu[id+'Menu'] || '';
                    const words = text.toLowerCase().split(/\s+/);
                    for (let i = words.length - 1; i >= 0; i--) {
                        if (FOOD_EMOJIS[words[i]]) {
                            currentEmoji = FOOD_EMOJIS[words[i]];
                            break;
                        }
                    }
                }

                return `
                <div id="drop-${id}" class="dropzone group flex flex-col h-full rounded-t-[3rem] rounded-b-3xl relative overflow-hidden transition-all duration-200 hover:-translate-y-1 flex-1 border-4 border-transparent hover:border-white/50">
                    
                    <!-- Monster Head/Header -->
                    <div class="monster-face relative h-32 md:h-40 ${color} transition-transform duration-300 z-10 flex flex-col items-center justify-end pb-3">
                        <div class="absolute top-6 w-full flex justify-center gap-6">
                            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center"><div class="w-4 h-4 ${eyeColor} rounded-full"></div></div>
                            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center"><div class="w-4 h-4 ${eyeColor} rounded-full"></div></div>
                        </div>
                        
                         ${isInput 
                            ? `<input id="input-${id}" value="${menu[id+'Menu'] || ''}" placeholder="${placeholder}" class="absolute top-20 w-4/5 bg-white text-slate-900 placeholder-slate-400 border-4 border-slate-200 text-center font-display text-2xl rounded-full py-2 focus:scale-105 focus:outline-none focus:border-crayon-blue transition-all shadow-cartoon z-20">`
                            : `<div class="absolute top-20 bg-white text-slate-900 px-6 py-2 rounded-full font-display text-2xl tracking-wide uppercase shadow-cartoon border-4 border-slate-200 z-20 whitespace-nowrap">${title}</div>`
                        }
                        
                        <div id="emoji-display-${id}" class="absolute -top-4 -right-4 text-7xl transform rotate-12 transition-all duration-300 ${currentEmoji ? 'scale-100 opacity-100' : 'scale-0 opacity-0'} filter drop-shadow-lg z-30 pointer-events-none">${currentEmoji}</div>
                        <div class="monster-mouth w-20 h-5 bg-slate-800 rounded-full transition-all duration-200 mb-2 opacity-80 group-hover:opacity-100"></div>
                    </div>

                    <!-- Body / Tray (Fills Remaining Space) -->
                    <div class="flex-grow bg-slate-100 border-x-4 border-b-4 border-slate-200 rounded-b-3xl relative p-3 shadow-inner overflow-hidden">
                        <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(${eyeColor === 'bg-slate-800' ? '#94a3b8' : eyeColor.replace('bg-', '#')} 2px, transparent 2px); background-size: 20px 20px;"></div>
                        <div class="absolute top-3 right-3 bg-white px-4 py-1.5 rounded-full text-lg font-black text-slate-600 border-2 border-slate-200 shadow-sm z-10">
                            ${items.length}
                        </div>
                        <div class="relative z-0 h-full overflow-y-auto flex flex-wrap content-start justify-center gap-2 pb-4">
                             ${items.map(s => makeDraggable(s, id)).join('')}
                        </div>
                    </div>
                </div>
            `};

            const p1 = total ? Math.round((cols.choice1.length/total)*100) : 0;
            const p2 = total ? Math.round((cols.choice2.length/total)*100) : 0;
            const p3 = total ? Math.round((cols.choice3.length/total)*100) : 0;

            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col p-4 gap-4 relative overflow-hidden">
                    
                    <!-- Header -->
                    <div class="flex justify-between items-center flex-shrink-0 px-2">
                        <div>
                            <h2 class="text-3xl md:text-4xl font-display text-slate-800 flex items-center gap-3">
                                <span class="text-crayon-orange">Feed</span> the Monsters!
                            </h2>
                        </div>
                        <button id="reset-lunch" class="text-lg font-bold text-red-400 hover:text-white hover:bg-red-400 border-2 border-red-300 px-6 py-2 rounded-2xl transition-all">Reset Board</button>
                    </div>

                    <!-- The Monsters (Grow to fill vertical space) -->
                    <div class="flex flex-row gap-4 flex-grow min-h-0 items-stretch">
                        ${monsterTemplate('choice1', 'bg-monster-a', 'bg-blue-600', 'Option A', cols.choice1, true, 'Pizza?')}
                        ${monsterTemplate('choice2', 'bg-monster-b', 'bg-green-600', 'Option B', cols.choice2, true, 'Salad?')}
                        ${monsterTemplate('choice3', 'bg-monster-c', 'bg-orange-600', 'Home Lunch', cols.choice3, false)}
                    </div>

                    <!-- Waiting Area / Stats (Horizontal Strip at Bottom) -->
                    <div class="flex-shrink-0 h-[180px] md:h-[220px] bg-slate-50 rounded-3xl p-4 border-4 border-slate-200 border-dashed relative flex flex-col">
                        
                        <!-- Live Stats Bar -->
                        <div class="absolute bottom-0 left-0 right-0 h-4 bg-slate-200 rounded-b-2xl overflow-hidden flex">
                            <div style="width:${p1}%" class="bg-monster-a transition-all duration-500"></div>
                            <div style="width:${p2}%" class="bg-monster-b transition-all duration-500"></div>

                        </div>

                        <div class="flex justify-between items-center mb-2 px-1">
                            <div class="bg-slate-200 text-slate-500 px-4 py-1 rounded-full font-bold uppercase text-sm tracking-wider">Waiting to Eat</div>
                            <div class="text-sm font-bold text-slate-400 flex gap-4">
                                <span class="text-blue-400 text-lg">${p1}%</span>
                                <span class="text-green-400 text-lg">${p2}%</span>
                                <span class="text-orange-400 text-lg">${p3}%</span>

                            ${isComplete ? `
                                <div class="w-full flex flex-col items-center justify-center animate-pop-in">
                                    <h3 class="font-display text-4xl text-crayon-green uppercase drop-shadow-sm">Bon Appétit!</h3>
                                    <p class="text-slate-400 text-xl font-bold">Class is ready.</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;

            // --- Robust Drag & Drop Logic for Smartboards ---
            let draggedItem = null;
            let sourceCol = null;

            const handleDragStart = (e) => {
                draggedItem = e.target;
                sourceCol = e.target.dataset.col;
                e.target.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            };

            const handleDragEnd = (e) => {
                if(e.target) e.target.classList.remove('dragging');
                document.querySelectorAll('.dropzone').forEach(d => {
                    d.classList.remove('dropzone-active');
                    d.classList.remove('chewing');
                });
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                const zone = e.target.closest('.dropzone');
                if (zone) zone.classList.add('dropzone-active');
            };
            
            const handleDragLeave = (e) => {
                const zone = e.target.closest('.dropzone');
                if (zone) zone.classList.remove('dropzone-active');
            };

            const handleDrop = (e) => {
                e.preventDefault();
                const zone = e.target.closest('.dropzone');
                if (!zone || !draggedItem) return;
                const targetId = zone.id.replace('drop-', '');
                if (targetId === sourceCol) return;
                zone.classList.add('chewing');
                setTimeout(() => zone.classList.remove('chewing'), 500);
                const studentId = draggedItem.dataset.id;
                moveStudent(sourceCol, targetId, studentId);
            };

            // Enhanced Touch Handling for Smartboards
            let activeTouchEl = null;
            let touchOffsetX = 0;
            let touchOffsetY = 0;
            let originalSourceEl = null;

            const handleTouchStart = (e) => {
                const item = e.target.closest('.draggable-item');
                if (!item) return;
                e.preventDefault();
                originalSourceEl = item;
                sourceCol = item.dataset.col;
                
                // Create larger clone for visibility under finger/stylus
                activeTouchEl = item.cloneNode(true);
                activeTouchEl.classList.remove('draggable-item');
                activeTouchEl.classList.add('touch-dragging');
                // Force size
                activeTouchEl.style.width = (item.offsetWidth * 1.1) + 'px';
                activeTouchEl.style.height = (item.offsetHeight * 1.1) + 'px';
                
                const touch = e.touches[0];
                const rect = item.getBoundingClientRect();
                touchOffsetX = (touch.clientX - rect.left) * 1.1; // Adjust offset for scale
                touchOffsetY = (touch.clientY - rect.top) * 1.1;
                
                activeTouchEl.style.left = (touch.clientX - touchOffsetX) + 'px';
                activeTouchEl.style.top = (touch.clientY - touchOffsetY - 20) + 'px'; // Lift slightly
                
                document.body.appendChild(activeTouchEl); // Append to body to escape overflow containers
                item.style.opacity = '0.3';
            };

            const handleTouchMove = (e) => {
                if (!activeTouchEl) return;
                e.preventDefault();
                const touch = e.touches[0];
                activeTouchEl.style.left = (touch.clientX - touchOffsetX) + 'px';
                activeTouchEl.style.top = (touch.clientY - touchOffsetY - 20) + 'px';
                
                document.querySelectorAll('.dropzone').forEach(d => d.classList.remove('dropzone-active'));
                let elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                let zone = elemBelow ? elemBelow.closest('.dropzone') : null;
                if (zone) zone.classList.add('dropzone-active');
            };

            const handleTouchEnd = (e) => {
                if (!activeTouchEl) return;
                e.preventDefault();
                const touch = e.changedTouches[0];
                let elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                activeTouchEl.remove();
                activeTouchEl = null;
                if(originalSourceEl) originalSourceEl.style.opacity = '1';
                
                document.querySelectorAll('.dropzone').forEach(d => {
                    d.classList.remove('dropzone-active');
                    d.classList.remove('chewing');
                });
                
                let zone = elemBelow ? elemBelow.closest('.dropzone') : null;
                if (zone && originalSourceEl) {
                    const targetId = zone.id.replace('drop-', '');
                    if (targetId !== sourceCol) {
                        zone.classList.add('chewing');
                        setTimeout(() => zone.classList.remove('chewing'), 500);
                        moveStudent(sourceCol, targetId, originalSourceEl.dataset.id);
                    }
                }
                originalSourceEl = null;
            };

            const moveStudent = (fromCol, toCol, sId) => {
                const student = appState.lunchColumns[fromCol].find(s => s.id === sId);
                if(student) {
                    appState.lunchColumns[fromCol] = appState.lunchColumns[fromCol].filter(s => s.id !== sId);
                    appState.lunchColumns[toCol].push(student);
                    
                    const newTotal = appState.lunchColumns.choice1.length + appState.lunchColumns.choice2.length + appState.lunchColumns.choice3.length + appState.lunchColumns.unselected.length;
                    if (appState.lunchColumns.unselected.length === 0 && newTotal > 0 && fromCol === 'unselected') {
                        triggerConfetti();
                    }
                    renderLunchChoice();
                }
            }

            // Bind Events
            toolDisplay.querySelectorAll('.draggable-item').forEach(el => {
                el.addEventListener('dragstart', handleDragStart);
                el.addEventListener('dragend', handleDragEnd);
                el.addEventListener('touchstart', handleTouchStart, {passive: false});
                el.addEventListener('touchmove', handleTouchMove, {passive: false});
                el.addEventListener('touchend', handleTouchEnd);
            });
            toolDisplay.querySelectorAll('.dropzone').forEach(el => {
                el.addEventListener('dragover', handleDragOver);
                el.addEventListener('dragleave', handleDragLeave);
                el.addEventListener('drop', handleDrop);
            });

            ['choice1', 'choice2'].forEach(key => {
                const input = document.getElementById(`input-${key}`);
                const emojiDisplay = document.getElementById(`emoji-display-${key}`);
                if (input) {
                    input.oninput = (e) => {
                        const val = e.target.value;
                        appState.lunchMenu[`${key}Menu`] = val;
                        const words = val.toLowerCase().split(/\s+/);
                        let foundEmoji = '';
                        for (let i = words.length - 1; i >= 0; i--) {
                            if (FOOD_EMOJIS[words[i]]) {
                                foundEmoji = FOOD_EMOJIS[words[i]];
                                break;
                            }
                        }
                        if (emojiDisplay) {
                            emojiDisplay.textContent = foundEmoji;
                            if (foundEmoji) {
                                emojiDisplay.classList.remove('scale-0', 'opacity-0');
                                emojiDisplay.classList.add('scale-100', 'opacity-100');
                            } else {
                                emojiDisplay.classList.remove('scale-100', 'opacity-100');
                                emojiDisplay.classList.add('scale-0', 'opacity-0');
                            }
                        }
                    };
                }
            });

            document.getElementById('reset-lunch').onclick = () => {
                appState.lunchColumns = null;
                appState.lunchMenu = {};
                randomizeEmojis();
                renderLunchChoice();
            };
        }

        // --- Tool: Quiet Critter (Noise Meter) ---
        
        function renderNoiseMeter() {
            let isListening = false;
            let audioContext = null;
            
            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center p-6 text-center animate-pop-in">
                    <h2 class="text-4xl md:text-5xl font-display text-slate-800 mb-4">The Quiet Critter</h2>
                    <p class="text-slate-500 mb-8 max-w-lg text-xl">Keep the volume down so the Critter can sleep! If it gets too loud, he'll wake up!</p>
                    
                    <div class="relative w-80 h-80 md:w-[500px] md:h-[500px] mb-12">
                        <!-- Sleeping State -->
                        <div id="critter-sleep" class="absolute inset-0 flex flex-col items-center justify-center transition-opacity duration-500">
                            <div class="text-9xl md:text-[20rem] animate-float">😴</div>
                            <div class="absolute top-0 right-10 text-6xl animate-pulse text-slate-400 font-display">Zzz...</div>
                        </div>
                        
                        <!-- Awake State -->
                        <div id="critter-awake" class="absolute inset-0 flex flex-col items-center justify-center transition-opacity duration-200 opacity-0 scale-90">
                            <div class="text-9xl md:text-[20rem] animate-shake">😳</div>
                        </div>

                         <!-- Angry State -->
                        <div id="critter-angry" class="absolute inset-0 flex flex-col items-center justify-center transition-opacity duration-200 opacity-0 scale-110">
                            <div class="text-9xl md:text-[20rem] animate-bounce-slow">😫</div>
                        </div>
                    </div>

                    <!-- Volume Bar -->
                    <div class="w-full max-w-3xl h-12 bg-slate-200 rounded-full overflow-hidden border-8 border-slate-300 relative shadow-inner">
                        <div id="volume-fill" class="h-full bg-green-400 w-0 meter-fill"></div>
                        <div class="absolute top-0 bottom-0 w-2 bg-red-400 left-[70%] opacity-50"></div>
                    </div>
                    <div class="text-lg font-bold text-slate-400 mt-2 uppercase tracking-widest">Noise Level</div>

                    <button id="toggle-mic" class="mt-8 btn-cartoon bg-crayon-pink text-white px-12 py-6 rounded-3xl font-black text-3xl flex items-center gap-4">
                        <i data-lucide="mic" class="w-8 h-8"></i> Start Listening
                    </button>
                    <p id="mic-error" class="text-red-500 font-bold mt-4 hidden text-xl">Microphone access denied or unavailable.</p>
                </div>
            `;

            const btn = document.getElementById('toggle-mic');
            const fill = document.getElementById('volume-fill');
            const sleepEl = document.getElementById('critter-sleep');
            const awakeEl = document.getElementById('critter-awake');
            const angryEl = document.getElementById('critter-angry');
            const errorEl = document.getElementById('mic-error');

            const updateCritter = (vol) => {
                fill.style.width = Math.min(vol, 100) + '%';
                if (vol > 70) {
                    fill.className = 'h-full bg-red-500 meter-fill';
                    sleepEl.style.opacity = '0'; awakeEl.style.opacity = '0'; angryEl.style.opacity = '1';
                } else if (vol > 30) {
                    fill.className = 'h-full bg-yellow-400 meter-fill';
                    sleepEl.style.opacity = '0'; awakeEl.style.opacity = '1'; angryEl.style.opacity = '0';
                } else {
                    fill.className = 'h-full bg-green-400 meter-fill';
                    sleepEl.style.opacity = '1'; awakeEl.style.opacity = '0'; angryEl.style.opacity = '0';
                }
            };

            btn.onclick = async () => {
                if (isListening) { window.location.reload(); return; }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const analyser = audioContext.createAnalyser();
                    const microphone = audioContext.createMediaStreamSource(stream);
                    const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);
                    analyser.smoothingTimeConstant = 0.8; analyser.fftSize = 1024;
                    microphone.connect(analyser); analyser.connect(javascriptNode); javascriptNode.connect(audioContext.destination);
                    javascriptNode.onaudioprocess = function() {
                        const array = new Uint8Array(analyser.frequencyBinCount);
                        analyser.getByteFrequencyData(array);
                        let values = 0;
                        for (let i = 0; i < array.length; i++) values += array[i];
                        updateCritter((values / array.length) * 2.5);
                    };
                    btn.innerHTML = `<i data-lucide="mic-off"></i> Stop Listening`;
                    btn.classList.replace('bg-crayon-pink', 'bg-slate-700');
                    isListening = true;
                    errorEl.classList.add('hidden');
                } catch (err) { console.error(err); errorEl.classList.remove('hidden'); }
            };
        }

        // --- Tool: Focus Timer ---

        function renderTimer() {
            let secondsLeft = 300; let totalTime = 300; let isRunning = false;
            
            const formatTime = (s) => {
                const m = Math.floor(s / 60); const sec = s % 60;
                return `${m}:${sec < 10 ? '0' : ''}${sec}`;
            };

            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center p-6 animate-pop-in">
                    <div class="relative w-[300px] h-[300px] md:w-[600px] md:h-[600px] flex items-center justify-center mb-12">
                        <div class="absolute inset-0 rounded-full border-8 border-slate-100 bg-white shadow-inner-lg"></div>
                        <svg class="absolute inset-0 w-full h-full transform -rotate-90 pointer-events-none">
                            <circle id="timer-ring" cx="50%" cy="50%" r="45%" stroke="#ef4444" stroke-width="30" fill="none" stroke-linecap="round" stroke-dasharray="1000" stroke-dashoffset="0" class="transition-all duration-1000 ease-linear" />
                        </svg>
                        <div class="relative z-10 text-center group cursor-pointer" id="timer-display-container" title="Click to Set Time">
                            <div id="time-display" class="font-display text-8xl md:text-[12rem] text-slate-800 tracking-tighter tabular-nums select-none group-hover:text-crayon-blue transition-colors">05:00</div>
                            <div class="text-slate-400 font-bold uppercase tracking-widest mt-4 text-2xl group-hover:text-crayon-blue transition-colors">Time Remaining</div>
                        </div>
                    </div>
                    <div id="timer-controls" class="flex flex-wrap justify-center gap-6 min-h-[80px] items-center"></div>
                    <button id="timer-toggle" class="mt-12 btn-cartoon bg-crayon-green text-white w-32 h-32 rounded-full flex items-center justify-center shadow-cartoon transition-colors">
                        <i data-lucide="play" class="w-16 h-16 fill-current"></i>
                    </button>
                </div>
            `;

            const ring = document.getElementById('timer-ring');
            const display = document.getElementById('time-display');
            const toggleBtn = document.getElementById('timer-toggle');
            const controlsContainer = document.getElementById('timer-controls');
            ring.setAttribute("pathLength", "100");

            const updateVisuals = () => {
                display.innerText = formatTime(secondsLeft);
                const percent = totalTime > 0 ? (secondsLeft / totalTime) * 100 : 0;
                ring.style.strokeDashoffset = 100 - percent;
                if (percent < 20) ring.setAttribute('stroke', '#ef4444');
                else if (percent < 50) ring.setAttribute('stroke', '#facc15');
                else ring.setAttribute('stroke', '#22c55e');
            };

            const stopTimer = (isFinished = false) => {
                clearInterval(appState.timerInterval); isRunning = false;
                toggleBtn.innerHTML = isFinished ? `<i data-lucide="rotate-ccw" class="w-16 h-16"></i>` : `<i data-lucide="play" class="w-16 h-16 fill-current"></i>`;
                if(isFinished) {
                    toggleBtn.classList.replace('bg-crayon-red', 'bg-slate-700');
                    display.classList.add('animate-pulse', 'text-red-500');
                    triggerConfetti();
                } else {
                    toggleBtn.classList.remove('bg-crayon-red', 'bg-slate-700');
                    toggleBtn.classList.add('bg-crayon-green');
                }
            };

            const tick = () => { if (secondsLeft > 0) { secondsLeft--; updateVisuals(); } else { stopTimer(true); } };

            toggleBtn.onclick = () => {
                if (isRunning) { clearInterval(appState.timerInterval); isRunning = false; toggleBtn.innerHTML = `<i data-lucide="play" class="w-16 h-16 fill-current"></i>`; toggleBtn.classList.replace('bg-crayon-red', 'bg-crayon-green'); } 
                else {
                    if (secondsLeft === 0) secondsLeft = totalTime || 300;
                    appState.timerInterval = setInterval(tick, 1000); isRunning = true;
                    toggleBtn.innerHTML = `<i data-lucide="pause" class="w-16 h-16 fill-current"></i>`; toggleBtn.classList.replace('bg-crayon-green', 'bg-crayon-red');
                    display.classList.remove('animate-pulse', 'text-red-500');
                }
                lucide.createIcons();
            };

            const setTime = (m) => { secondsLeft = m * 60; totalTime = secondsLeft; stopTimer(false); display.classList.remove('animate-pulse', 'text-red-500'); updateVisuals(); };
            const addTime = (m) => { secondsLeft += m * 60; totalTime = Math.max(totalTime, secondsLeft); updateVisuals(); };

            const renderControls = (mode = 'default') => {
                if(mode === 'default') {
                    controlsContainer.innerHTML = `
                        <button id="timer-5m" class="px-6 py-3 bg-slate-100 rounded-2xl font-bold hover:bg-slate-200 text-slate-600 text-xl transition-colors">+5 Min</button>
                        <button id="timer-1m" class="px-6 py-3 bg-slate-100 rounded-2xl font-bold hover:bg-slate-200 text-slate-600 text-xl transition-colors">+1 Min</button>
                        <button id="timer-custom" class="px-6 py-3 bg-slate-100 rounded-2xl font-bold hover:bg-slate-200 text-slate-600 text-xl transition-colors">Set Time</button>
                        <button id="timer-reset" class="px-6 py-3 bg-slate-100 rounded-2xl font-bold hover:bg-slate-200 text-red-400 text-xl transition-colors">Reset</button>
                    `;
                    document.getElementById('timer-5m').onclick = () => addTime(5);
                    document.getElementById('timer-1m').onclick = () => addTime(1);
                    document.getElementById('timer-custom').onclick = () => renderControls('custom');
                    document.getElementById('timer-reset').onclick = () => setTime(5);
                } else {
                    controlsContainer.innerHTML = `
                        <div class="flex items-center gap-4 animate-pop-in">
                            <input type="number" id="custom-min" placeholder="Min" class="w-32 px-4 py-3 border-4 border-slate-300 rounded-2xl font-bold text-2xl focus:border-crayon-blue outline-none text-center" min="1" max="999" autofocus>
                            <button id="timer-set" class="px-6 py-3 bg-crayon-blue text-white rounded-2xl font-bold text-xl hover:bg-blue-600 transition-colors">Go</button>
                            <button id="timer-cancel" class="px-6 py-3 bg-slate-100 text-slate-500 rounded-2xl font-bold text-xl hover:bg-slate-200 transition-colors">X</button>
                        </div>
                    `;
                    const input = document.getElementById('custom-min');
                    input.focus();
                    input.onkeydown = (e) => { if(e.key === 'Enter') document.getElementById('timer-set').click(); };
                    document.getElementById('timer-set').onclick = () => { const val = parseInt(input.value); if(val && val > 0) { setTime(val); renderControls('default'); } };
                    document.getElementById('timer-cancel').onclick = () => renderControls('default');
                }
            };
            document.getElementById('timer-display-container').onclick = () => renderControls('custom');
            renderControls(); updateVisuals();
        }

        function generateDoubleElimination() {
            const players = appState.students.filter(s => s.isPresent).sort(() => Math.random() - 0.5);
            if (players.length < 3) { alert("Need at least 3 players!"); return; }

            // Pad to power of 2
            let size = 2;
            while(size < players.length) size *= 2;
            while(players.length < size) players.push({ name: 'BYE', id: 'bye' });

            const matches = [];
            
            // --- Winners Bracket Generation ---
            const totalRounds = Math.log2(size);
            let currentRoundMatches = [];
            
            // Round 1
            for(let i=0; i<size/2; i++) {
                const id = `W1-${i+1}`;
                const m = { id, type: 'winner', round: 1, players: [players[i], players[size-1-i]], winner: null, nextWin: null, nextLose: null };
                matches.push(m);
                currentRoundMatches.push(m);
            }

            let prevRoundMatches = currentRoundMatches;
            for(let r=2; r<=totalRounds; r++) {
                currentRoundMatches = [];
                for(let i=0; i<prevRoundMatches.length/2; i++) {
                    const id = `W${r}-${i+1}`;
                    const m = { id, type: 'winner', round: r, players: [null, null], winner: null, nextWin: null, nextLose: null };
                    matches.push(m);
                    currentRoundMatches.push(m);
                    
                    prevRoundMatches[i*2].nextWin = { id, slot: 0 };
                    prevRoundMatches[i*2+1].nextWin = { id, slot: 1 };
                }
                prevRoundMatches = currentRoundMatches;
            }
            const wbFinalMatch = prevRoundMatches[0]; // This winner goes to Grand Final

            // --- Losers Bracket Generation ---
            // Structure for 8 players (Total Size):
            // L1 (4 matches) -> L2 (2 matches) -> L3 (2 matches) -> L4 (1 match) -> GF
            
            let lbMatchesByRound = {};
            const createLBMatch = (r, idx) => {
                const id = `L${r}-${idx+1}`;
                const m = { id, type: 'loser', round: r, players: [null, null], winner: null, nextWin: null };
                matches.push(m);
                if(!lbMatchesByRound[r]) lbMatchesByRound[r] = [];
                lbMatchesByRound[r].push(m);
                return m;
            };

            // Calculate LB structure
            // L-Round 1 takes W-Round 1 losers. Count = Size/4
            for(let i=0; i<size/4; i++) createLBMatch(1, i);
            
            // Subsequent LB rounds
            let lbRound = 2;
            let matchCount = size/4; 
            
            // Logic: The number of matches in LB stays same for 2 rounds, then halves
            // For 8 players: L1(2), L2(2), L3(1)
            // For 16 players: L1(4), L2(4), L3(2), L4(2), L5(1)
            
            while(matchCount >= 1) {
                // First round of a pair (fed by LB winners + WB losers)
                for(let i=0; i<matchCount; i++) createLBMatch(lbRound, i);
                if (matchCount === 1) break; // Final LB match (before GF)
                
                lbRound++;
                // Second round of a pair (fed by LB winners only)
                for(let i=0; i<matchCount/2; i++) createLBMatch(lbRound, i);
                
                matchCount /= 2;
                lbRound++;
            }
            const maxLbRound = lbRound;
            
            // --- Wiring Losers Logic ---
            
            // Wire WB R1 losers to LB R1
            const wbR1 = matches.filter(m => m.type === 'winner' && m.round === 1);
            const lbR1 = matches.filter(m => m.type === 'loser' && m.round === 1);
            
            // Simple cross mapping to avoid immediate rematches
            // Top half of bracket vs bottom half logic usually
            for(let i=0; i<wbR1.length; i++) {
                // Map WB matches 0,1 -> LB 0. WB 2,3 -> LB 1.
                const targetLbIdx = Math.floor(i/2);
                const targetSlot = i%2; 
                wbR1[i].nextLose = { id: lbR1[targetLbIdx].id, slot: targetSlot };
            }

            // Wire LB internal + Drops from WB
            // Pattern: 
            // Odd LB rounds (1, 3, 5...) receive WB losers.
            // Even LB rounds (2, 4, 6...) are just LB winners advancing.
            
            // Actually, standard DE:
            // L1: WB R1 losers.
            // L2: L1 Winners + WB R2 Losers.
            // L3: L2 Winners.
            // L4: L3 Winners + WB R3 Losers.
            
            // Let's wire purely based on existence
            let currentLbR = 1;
            let currentWbR = 2; // WB round that feeds into LB
            
            while(currentLbR < maxLbRound) {
                const currentLbMatches = matches.filter(m => m.type === 'loser' && m.round === currentLbR);
                const nextLbMatches = matches.filter(m => m.type === 'loser' && m.round === currentLbR + 1);
                
                // If next round has SAME amount of matches, it's a "Drop Round" (fed by WB)
                if (nextLbMatches.length === currentLbMatches.length) {
                    // Current LB winners go to slot 0 of next
                    for(let i=0; i<currentLbMatches.length; i++) {
                        currentLbMatches[i].nextWin = { id: nextLbMatches[i].id, slot: 0 };
                    }
                    // WB Losers go to slot 1
                    const wbDropMatches = matches.filter(m => m.type === 'winner' && m.round === currentWbR);
                    // We need to reverse map or cross map to avoid repeat matchups
                    for(let i=0; i<wbDropMatches.length; i++) {
                         // Simple map for robustness
                         if(i < nextLbMatches.length) {
                            wbDropMatches[i].nextLose = { id: nextLbMatches[i].id, slot: 1 };
                         }
                    }
                    currentWbR++;
                } else {
                    // It's a "consolidation round" (halving matches)
                    for(let i=0; i<currentLbMatches.length; i++) {
                        const target = nextLbMatches[Math.floor(i/2)];
                        currentLbMatches[i].nextWin = { id: target.id, slot: i%2 };
                    }
                }
                currentLbR++;
            }

            // --- Grand Finals Wiring ---
            const finalId = 'grand-final';
            const grandFinal = { id: finalId, type: 'final', round: 1, players: [null, null], winner: null };
            matches.push(grandFinal);
            
            // WB Winner -> GF Slot 0
            wbFinalMatch.nextWin = { id: finalId, slot: 0 };
            
            // LB Winner -> GF Slot 1
            const lbFinalMatch = matches.filter(m => m.type === 'loser' && m.round === maxLbRound)[0];
            if(lbFinalMatch) lbFinalMatch.nextWin = { id: finalId, slot: 1 };

            // Note: WB Final Loser needs to go to LB Final
            // The WB Final is the one before wbFinalMatch? No, wbFinalMatch IS the match that produces the WB winner.
            // The loser of wbFinalMatch goes to the LB Final (maxLbRound).
            // Actually, logic check:
            // WB Final produces 1 undefeated (to GF) and 1 loser.
            // That loser goes to the very last match of LB.
            // Let's fix the WB drop for the final WB round.
            wbFinalMatch.nextLose = { id: lbFinalMatch.id, slot: 1 }; // Last LB match gets WB finalist loser in slot 1 (usually)
            
            // The last LB match needs a player in slot 0 too.
            // That comes from the previous LB round.
            // (Handled by the loop above hopefully, but let's verify)
            
            appState.bracket = { matches };
            
            // Auto-Advance BYEs
            matches.forEach(m => {
                const byeIdx = m.players.findIndex(p => p && p.id === 'bye');
                if (byeIdx !== -1) {
                    const realPlayerIdx = byeIdx === 0 ? 1 : 0;
                    if(m.players[realPlayerIdx] && m.players[realPlayerIdx].id !== 'bye') {
                       advanceBracket(m.id, m.players[realPlayerIdx].id); 
                    }
                }
            });
            
            renderTournamentBracket();
        }

        function advanceBracket(matchId, winnerId) {
            const matches = appState.bracket.matches;
            const match = matches.find(m => m.id === matchId);
            if (!match || match.winner) return; // Already decided

            const winner = match.players.find(p => p.id === winnerId);
            const loser = match.players.find(p => p.id !== winnerId);
            match.winner = winner;

            // Handle standard advancements
            if (match.nextWin) {
                const nextM = matches.find(m => m.id === match.nextWin.id);
                if (nextM) nextM.players[match.nextWin.slot] = winner;
            }
            if (match.nextLose) {
                const nextM = matches.find(m => m.id === match.nextLose.id);
                if (nextM) nextM.players[match.nextLose.slot] = loser;
            }
            
            // --- Grand Final Logic ---
            if (match.id === 'grand-final') {
                // If the player from Slot 0 (WB Winner) wins, it's over.
                // If the player from Slot 1 (LB Winner) wins, we need a reset.
                
                // Note: We need to know who came from where.
                // By our generation, Slot 0 is always WB.
                if (match.players[0].id === winner.id) {
                    // WB Winner won. Over.
                    appState.podium = { first: winner, second: loser };
                    triggerConfetti();
                } else {
                    // LB Winner won. Reset needed.
                    // Check if reset match already exists
                    if (!matches.find(m => m.id === 'grand-final-reset')) {
                        matches.push({
                            id: 'grand-final-reset',
                            type: 'final-reset',
                            round: 2,
                            players: [winner, loser], // Rematch
                            winner: null
                        });
                        alert("Bracket Reset! The challenger forced a second match!");
                    }
                }
            }
            
            // --- Grand Final Reset Logic ---
            if (match.id === 'grand-final-reset') {
                appState.podium = { first: winner, second: loser };
                triggerConfetti();
            }

            renderTournamentBracket();
        }

        // --- Helpers ---
        function triggerConfetti() {
            for(let i=0; i<40; i++) {
                const c = document.createElement('div');
                c.className = 'fixed w-4 h-4 rounded-full z-[100] pointer-events-none';
                c.style.backgroundColor = ['#facc15', '#ef4444', '#3b82f6', '#22c55e', '#a855f7'][Math.floor(Math.random()*5)];
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-10px';
                document.body.appendChild(c);
                const anim = c.animate([
                    { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                    { transform: `translateY(100vh) rotate(${720}deg)`, opacity: 0 }
                ], { duration: 1500 + Math.random()*2000, easing: 'ease-out' });
                anim.onfinish = () => c.remove();
            }
        }

        function setupFullscreen() {
            const btn = document.getElementById('fullscreen-btn');
            const container = document.getElementById('app-container');
            btn.onclick = async () => {
                if (!document.fullscreenElement) {
                    try { if (container.requestFullscreen) await container.requestFullscreen(); else container.classList.add('viewport-fullscreen'); } 
                    catch (e) { container.classList.add('viewport-fullscreen'); }
                } else {
                    if (document.exitFullscreen) await document.exitFullscreen();
                    container.classList.remove('viewport-fullscreen');
                }
            };
        }

        init();
    </script>
</body>
</html>
