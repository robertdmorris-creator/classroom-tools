<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classroom Tools: 5th Grade Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Nunito for a friendly, rounded look -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        paper: '#ffffff',
                        crayon: {
                            blue: '#3b82f6',
                            yellow: '#fbbf24',
                            green: '#22c55e',
                            red: '#ef4444',
                            purple: '#a855f7',
                            orange: '#f97316'
                        }
                    },
                    boxShadow: {
                        'cartoon': '4px 4px 0px 0px rgba(0,0,0,0.15)',
                        'cartoon-hover': '6px 6px 0px 0px rgba(0,0,0,0.2)',
                        'cartoon-active': '2px 2px 0px 0px rgba(0,0,0,0.2)',
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                        'pop-in': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.5)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #fef3c7 100%); /* Sky to Sun gradient */
            color: #1e293b;
            overscroll-behavior: none; /* Prevent bounce on Mac/iOS */
            -webkit-tap-highlight-color: transparent; /* Removes flash on touch */
        }
        
        /* Ensure background persists in native fullscreen */
        #app-container:fullscreen {
            background: linear-gradient(135deg, #e0f2fe 0%, #fef3c7 100%);
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
        }

        /* Fun Panel Style */
        .fun-panel {
            background: white;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.05);
        }

        /* Big Cartoon Buttons */
        .btn-cartoon {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }
        .btn-cartoon:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,0.1);
        }
        .btn-cartoon:active {
            transform: translateY(2px);
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,0.1);
        }

        /* Custom Scrollbar for big screens */
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; border: 3px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }

        /* Loader */
        .loader {
            width: 60px;
            height: 60px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Dragging visuals */
        .dragging { opacity: 0.3; }
        
        /* Touch Dragging - The 'Ghost' Element */
        .touch-dragging {
            position: fixed; 
            z-index: 9999; 
            pointer-events: none; /* CRITICAL: Allows elementFromPoint to see through this */
            opacity: 0.9; 
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            width: auto;
            height: auto;
        }
        
        .dropzone-active { 
            background-color: #f0f9ff !important;
            border-color: #3b82f6 !important;
            border-width: 4px !important;
            /* transform: scale(1.01); REMOVED to prevent hiccup */
        }

        /* Smartboard Fullscreen overrides */
        .viewport-fullscreen {
            position: fixed !important; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            background: linear-gradient(135deg, #e0f2fe 0%, #fef3c7 100%);
            display: flex; flex-direction: column;
        }
        .viewport-fullscreen #tool-display { border-radius: 0; border: none; box-shadow: none; background: rgba(255,255,255,0.8); }
        
        .student-card-emoji { font-size: 3rem; line-height: 1; }
        .student-list-emoji { font-size: 2rem; }
    </style>
</head>
<body class="h-screen min-h-screen font-sans antialiased overflow-hidden text-slate-800 selection:bg-crayon-yellow selection:text-slate-900">

    <div id="app-container" class="relative flex flex-col h-full z-10">

        <!-- Header / Nav (Compact Version) -->
        <header class="flex-shrink-0 px-4 pt-2 pb-2">
            <div class="fun-panel px-3 py-2 flex items-center justify-between gap-4">
                <div class="flex items-center gap-3 px-1 flex-shrink-0">
                    <div class="p-2 bg-crayon-blue rounded-xl shadow-cartoon text-white transform -rotate-3">
                        <i data-lucide="backpack" class="w-6 h-6"></i>
                    </div>
                    <div class="hidden sm:block">
                        <h1 class="font-black text-xl md:text-2xl tracking-tight text-slate-700 leading-none">Classroom<span class="text-crayon-blue">Tools</span></h1>
                    </div>
                </div>

                <!-- Navigation Tabs - COMPACT BUTTONS -->
                <nav id="tool-nav" class="flex gap-2 overflow-x-auto no-scrollbar mx-2 flex-grow justify-center">
                    <!-- Buttons injected via JS -->
                </nav>

                <div class="flex items-center gap-2 flex-shrink-0">
                    <button id="fullscreen-btn" class="p-2 md:p-3 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors" title="Toggle Fullscreen">
                        <i data-lucide="maximize" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Tool Area -->
        <main class="flex-grow px-4 pb-4 pt-1 min-h-0">
            <div id="tool-display" class="fun-panel h-full w-full relative overflow-hidden flex flex-col bg-white/80 backdrop-blur-sm">
                <!-- Tool content renders here -->
                 <div class="flex flex-col items-center justify-center h-full text-center">
                     <span class="loader mb-6"></span>
                     <p class="text-2xl font-bold text-slate-400 animate-pulse">Loading Class Data...</p>
                 </div>
            </div>
        </main>
    </div>

    <!-- Firebase and Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuration & State ---
        const appState = {
            userId: null,
            isAuthReady: false,
            activeTool: 'classRoster',
            students: [],
            lunchColumns: null,
            lunchMenu: { choice1Menu: '', choice2Menu: '' },
            bracket: null,
            podium: null,
            lastTriggeredFood: null,
            emojiMap: {}
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "DEMO", authDomain: "DEMO", projectId: "DEMO" };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'classroom-tools-5th-grade';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const toolDisplay = document.getElementById('tool-display');
        const toolNav = document.getElementById('tool-nav');
        
        // Kid-friendly Emojis
        const AVATARS = [
            '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🦄','🐞','🦖','🐳','🐙','🦋',
            '🐝','🐢','🦎','🦒','🦓','🐘','🦛','🦏','🐪','🦙','🦘','🦡','🦢','🦜','🦩','🦚','🦉','🐊','🦈','🐬'
        ];

        // Food Emoji Dictionary
        const FOOD_EMOJIS = {
            'pizza': '🍕',
            'burger': '🍔', 'hamburger': '🍔', 'cheeseburger': '🍔',
            'hotdog': '🌭', 'hot dog': '🌭', 'frank': '🌭',
            'fries': '🍟', 'french fries': '🍟',
            'taco': '🌮', 'tacos': '🌮',
            'burrito': '🌯',
            'sandwich': '🥪', 'sub': '🥪',
            'salad': '🥗',
            'spaghetti': '🍝', 'pasta': '🍝', 'noodles': '🍝',
            'sushi': '🍣',
            'chicken': '🍗', 'nuggets': '🍗', 'wings': '🍗',
            'steak': '🥩', 'meat': '🥩',
            'egg': '🍳', 'eggs': '🍳',
            'pancake': '🥞', 'waffle': '🧇',
            'bacon': '🥓',
            'pretzel': '🥨',
            'bagel': '🥯',
            'cheese': '🧀',
            'soup': '🥣',
            'popcorn': '🍿',
            'cookie': '🍪', 'cookies': '🍪',
            'cake': '🍰', 'cupcake': '🧁',
            'donut': '🍩', 'doughnut': '🍩',
            'ice cream': '🍦', 'icecream': '🍦',
            'chocolate': '🍫',
            'candy': '🍬', 'lollipop': '🍭',
            'apple': '🍎',
            'banana': '🍌',
            'grapes': '🍇',
            'watermelon': '🍉',
            'orange': '🍊',
            'lemon': '🍋',
            'strawberry': '🍓',
            'cherry': '🍒',
            'peach': '🍑',
            'pineapple': '🍍',
            'corn': '🌽',
            'carrot': '🥕',
            'potato': '🥔',
            'broccoli': '🥦',
            'bread': '🍞', 'toast': '🍞',
            'milk': '🥛',
            'juice': '🧃',
            'water': '💧'
        };

        // Assign a random emoji to all students
        function randomizeEmojis() {
            if (appState.students.length > 0) {
                appState.students.forEach(s => {
                    appState.emojiMap[s.id] = AVATARS[Math.floor(Math.random() * AVATARS.length)];
                });
            }
        }

        // Helper to get emoji (uses map first, falls back to deterministic)
        function getStudentEmoji(student) {
            // Check map first
            if (appState.emojiMap[student.id]) {
                return appState.emojiMap[student.id];
            }
            
            // Initial deterministic fallback until reset or init
            let hash = 0;
            const name = student.name;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const emoji = AVATARS[Math.abs(hash) % AVATARS.length];
            appState.emojiMap[student.id] = emoji; // Save it
            return emoji;
        }

        // Tool Definitions
        const tools = {
            classRoster: { name: 'Roster', icon: 'users', color: 'bg-crayon-blue', render: renderClassRoster },
            studentSelector: { name: 'Picker', icon: 'dices', color: 'bg-crayon-purple', render: renderStudentSelector },
            lunchChoice: { name: 'Lunch', icon: 'utensils', color: 'bg-crayon-green', render: renderLunchChoice },
            tournamentBracket: { name: 'Bracket', icon: 'trophy', color: 'bg-crayon-yellow', render: renderTournamentBracket },
            hangman: { name: 'Hangman', icon: 'gamepad-2', color: 'bg-crayon-orange', render: renderHangman },
        };

        // --- Initialization ---

        function init() {
            renderNav();
            setupFullscreen();
            
            // Auth Flow
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    appState.userId = user.uid;
                    appState.isAuthReady = true;
                    await initializeRosterIfNeeded();
                    setupStudentListener();
                    renderActiveTool();
                }
            });

            // Initial Sign In
            (async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Auth failed:", error);
                    fallbackToLocal();
                }
            })();

            // Safety timeout
            setTimeout(() => { if (!appState.isAuthReady) fallbackToLocal(); }, 3500);
        }

        function fallbackToLocal() {
            if (appState.isAuthReady) return;
            console.warn("Using local mode");
            appState.isAuthReady = true;
            appState.students = ['Skylar', 'Terrell', 'DJ', 'Joshua', 'Cody', 'Leon', 'Alisha', 'Miracle'].map((n, i) => ({ id: `loc-${i}`, name: n, isPresent: true }));
            renderActiveTool();
        }

        async function initializeRosterIfNeeded() {
            if (!appState.userId) return;
            const settingsRef = doc(db, `artifacts/${appId}/users/${appState.userId}/settings`, 'roster');
            try {
                const snap = await getDoc(settingsRef);
                if (!snap.exists() || !snap.data().initialized) {
                    const studentsRef = collection(db, `artifacts/${appId}/users/${appState.userId}/students`);
                    // Clear existing (if any weird state)
                    const existing = await getDocs(studentsRef);
                    existing.forEach(d => deleteDoc(d.ref));
                    
                    const defaults = ['Skylar', 'Terrell', 'DJ', 'Joshua', 'Cody', 'Leon', 'Alisha', 'Miracle'];
                    await Promise.all(defaults.map(name => addDoc(studentsRef, { name, isPresent: true })));
                    await setDoc(settingsRef, { initialized: true });
                }
            } catch (e) { console.error("Roster init error", e); }
        }

        function setupStudentListener() {
            if (!appState.userId) return;
            const q = collection(db, `artifacts/${appId}/users/${appState.userId}/students`);
            onSnapshot(q, (snap) => {
                appState.students = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.name.localeCompare(b.name));
                // Randomize initially if empty map
                if (Object.keys(appState.emojiMap).length === 0) randomizeEmojis();
                refreshCurrentView();
            }, (err) => console.error("Snapshot error", err));
        }

        function refreshCurrentView() {
            if (['classRoster', 'studentSelector', 'lunchChoice'].includes(appState.activeTool)) {
                renderActiveTool();
            }
        }

        // --- Core UI Functions ---

        function renderNav() {
            toolNav.innerHTML = '';
            Object.entries(tools).forEach(([id, tool]) => {
                const btn = document.createElement('button');
                const isActive = appState.activeTool === id;
                // COMPACT BUTTONS for smaller banner
                btn.className = `
                    btn-cartoon flex items-center justify-center gap-2 px-3 py-2 md:px-5 rounded-xl text-base font-bold transition-all whitespace-nowrap
                    ${isActive 
                        ? `${tool.color} text-white shadow-cartoon` 
                        : 'bg-white text-slate-500 hover:bg-slate-50 border-slate-100'}
                `;
                btn.innerHTML = `<i data-lucide="${tool.icon}" class="w-5 h-5"></i> <span class="hidden md:inline">${tool.name}</span>`;
                btn.onclick = () => {
                    appState.activeTool = id;
                    renderNav();
                    renderActiveTool();
                };
                toolNav.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderActiveTool() {
            if (!appState.isAuthReady) return;
            const tool = tools[appState.activeTool];
            if (tool) tool.render();
            lucide.createIcons();
        }

        // --- Tool: Class Roster ---
        
        function renderClassRoster() {
            const listHtml = appState.students.map(s => `
                <div class="relative bg-white border-2 border-slate-200 p-4 rounded-3xl shadow-sm hover:shadow-cartoon hover:border-crayon-blue transition-all group flex flex-col items-center justify-center h-48">
                    <div class="student-card-emoji mb-2 transform transition-transform group-hover:scale-125 group-hover:rotate-12">
                        ${getStudentEmoji(s)}
                    </div>
                    <span class="font-extrabold text-2xl text-slate-700 text-center leading-tight select-none">${s.name}</span>
                    
                    <button data-id="${s.id}" class="remove-btn absolute top-2 right-2 opacity-0 group-hover:opacity-100 p-3 bg-red-100 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition-all shadow-sm" title="Remove">
                        <i data-lucide="trash-2" class="w-6 h-6"></i>
                    </button>
                </div>
            `).join('');

            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col p-4 md:p-6 animate-pop-in w-full">
                    <div class="flex flex-col lg:flex-row justify-between items-center mb-6 gap-6 flex-shrink-0">
                        <div class="text-center lg:text-left">
                            <h2 class="text-3xl font-black text-slate-800">Class Roster</h2>
                            <p class="text-slate-500 text-lg font-semibold mt-1">Total Students: <span class="text-crayon-blue">${appState.students.length}</span></p>
                        </div>
                        <form id="add-student-form" class="flex gap-3 w-full lg:w-auto">
                            <input type="text" id="new-name" placeholder="Student Name" class="flex-grow lg:w-80 border-4 border-slate-200 rounded-2xl px-4 py-3 text-xl font-bold text-slate-700 focus:outline-none focus:border-crayon-blue transition-colors placeholder-slate-300">
                            <button type="submit" class="btn-cartoon bg-crayon-green text-white px-6 py-3 rounded-2xl text-xl font-black flex items-center gap-3 whitespace-nowrap">
                                <i data-lucide="plus-circle" class="w-6 h-6"></i> Add
                            </button>
                        </form>
                    </div>
                    
                    <div class="flex-grow overflow-y-auto pr-2 pb-4">
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                            ${listHtml}
                        </div>
                        ${appState.students.length === 0 ? '<div class="flex flex-col items-center justify-center h-64 text-slate-400"><i data-lucide="ghost" class="w-16 h-16 mb-4"></i><p class="text-2xl font-bold">No students yet!</p></div>' : ''}
                    </div>
                </div>
            `;

            document.getElementById('add-student-form').onsubmit = async (e) => {
                e.preventDefault();
                const input = document.getElementById('new-name');
                const name = input.value.trim();
                if (!name) return;
                
                if (appState.userId) {
                    await addDoc(collection(db, `artifacts/${appId}/users/${appState.userId}/students`), { name, isPresent: true });
                } else {
                    appState.students.push({ id: `loc-${Date.now()}`, name, isPresent: true });
                    renderClassRoster();
                }
                input.value = '';
                input.focus();
            };

            toolDisplay.querySelectorAll('.remove-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Remove student from class?')) {
                        if (appState.userId) {
                            await deleteDoc(doc(db, `artifacts/${appId}/users/${appState.userId}/students`, btn.dataset.id));
                        } else {
                            appState.students = appState.students.filter(s => s.id !== btn.dataset.id);
                            renderClassRoster();
                        }
                    }
                };
            });
        }

        // --- Tool: Student Selector ---

        function renderStudentSelector() {
            const listHtml = appState.students.map(s => `
                <div class="flex items-center justify-between p-3 rounded-xl hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl select-none">${getStudentEmoji(s)}</span>
                        <span class="text-lg font-bold select-none ${s.isPresent ? 'text-slate-700' : 'text-slate-400 line-through opacity-60'}">${s.name}</span>
                    </div>
                    <button data-id="${s.id}" class="toggle-btn w-16 h-10 rounded-full relative transition-colors border-2 ${s.isPresent ? 'bg-crayon-green border-green-600' : 'bg-slate-200 border-slate-300'}">
                        <div class="w-8 h-8 bg-white rounded-full absolute top-0.5 shadow-sm transition-all ${s.isPresent ? 'left-7' : 'left-0.5'}"></div>
                    </button>
                </div>
            `).join('');

            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col md:flex-row p-4 md:p-6 animate-pop-in gap-6">
                    <!-- Sidebar: Attendance -->
                    <div class="w-full md:w-80 flex-shrink-0 flex flex-col bg-white rounded-3xl border-2 border-slate-200 shadow-sm overflow-hidden h-full">
                        <div class="p-4 bg-slate-50 border-b border-slate-200">
                            <h3 class="font-black text-xl text-slate-700 flex items-center gap-2">
                                <i data-lucide="check-circle-2" class="w-6 h-6 text-crayon-green"></i> Who's Here?
                            </h3>
                        </div>
                        <div class="overflow-y-auto flex-grow p-2">
                            ${listHtml}
                        </div>
                    </div>

                    <!-- Main: Action Area -->
                    <div class="flex-grow flex flex-col items-center justify-center relative">
                        
                        <div id="selector-display" class="w-full max-w-2xl bg-white rounded-[3rem] border-8 border-slate-100 shadow-xl flex flex-col items-center justify-center p-8 md:p-12 mb-8 aspect-video relative overflow-hidden">
                            <!-- Background Pattern -->
                            <div class="absolute inset-0 opacity-5" style="background-image: radial-gradient(#6366f1 2px, transparent 2px); background-size: 20px 20px;"></div>
                            
                            <div id="result-content" class="text-center relative z-10 w-full select-none">
                                <i data-lucide="sparkles" class="w-20 h-20 text-crayon-yellow mx-auto mb-4"></i>
                                <h2 class="text-3xl md:text-4xl font-black text-slate-800 mb-2">Ready to Pick!</h2>
                                <p class="text-slate-500 text-lg md:text-xl">Tap a button below to start</p>
                            </div>
                        </div>

                        <div class="flex flex-wrap gap-4 justify-center w-full">
                            <button id="pick-one-btn" class="btn-cartoon bg-crayon-purple text-white px-8 py-4 rounded-3xl font-black text-xl md:text-2xl shadow-cartoon flex items-center gap-3 transform active:scale-95">
                                <i data-lucide="wand-2" class="w-6 h-6 md:w-8 md:h-8"></i> PICK RANDOM
                            </button>
                            
                            <div class="w-px bg-slate-300 mx-2 hidden xl:block"></div>
                            
                            <button data-size="2" class="group-btn btn-cartoon bg-white border-2 border-slate-200 text-slate-600 px-5 py-3 rounded-2xl font-bold text-lg hover:text-crayon-blue hover:border-crayon-blue">Pairs</button>
                            <button data-size="3" class="group-btn btn-cartoon bg-white border-2 border-slate-200 text-slate-600 px-5 py-3 rounded-2xl font-bold text-lg hover:text-crayon-blue hover:border-crayon-blue">Threes</button>

                            <div id="result-content" class="text-center relative z-10 w-full"></div>
                        `;
                        display = document.getElementById('result-content');
                    }
                }
                
                if (!display) return; 

                const btn = document.getElementById('pick-one-btn');
                btn.disabled = true;
                
                // Animation loop
                let i = 0;
                const duration = 2000; // Longer suspense
                const interval = 100;
                const startTime = Date.now();
                
                const timer = setInterval(() => {
                    // Fix: Stop if user navigated away
                    if (!document.getElementById('result-content')) {
                        clearInterval(timer);
                        return;

                        <div class="transform scale-90 opacity-70 transition-all">

                            <h2 class="text-5xl font-black text-slate-300">${r.name}</h2>
                        </div>
                    `;
                    
                    if (Date.now() - startTime > duration) {
                        clearInterval(timer);
                        const winner = candidates[Math.floor(Math.random() * candidates.length)];
                        display.innerHTML = `
                            <div class="animate-pop-in transform scale-110">
                                <div class="text-sm font-black text-crayon-purple uppercase tracking-widest mb-4 bg-purple-100 inline-block px-4 py-1 rounded-full">The Winner Is</div>
                                <div class="text-8xl mb-6 animate-bounce-slow">${getStudentEmoji(winner)}</div>
                                <h2 class="text-7xl font-black text-crayon-blue pb-2">${winner.name}</h2>
                            </div>

                        for(let k=0; k<3; k++) setTimeout(triggerConfetti, k*300);
                    }

            };

            toolDisplay.querySelectorAll('.group-btn').forEach(btn => {
                btn.onclick = () => {
                    const size = parseInt(btn.dataset.size);
                    const candidates = appState.students.filter(s => s.isPresent).sort(() => Math.random() - 0.5);
                    const groups = [];
                    while(candidates.length) groups.push(candidates.splice(0, size));
                    
                    const groupsHtml = groups.map((g, i) => `
                        <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-200">
                            <div class="text-center font-black text-slate-400 mb-3 uppercase tracking-wider text-sm">Group ${i+1}</div>
                            <div class="space-y-2">
                                ${g.map(s => `
                                    <div class="flex items-center gap-3 bg-white p-2 rounded-lg border border-slate-100 shadow-sm">
                                        <span class="text-2xl">${getStudentEmoji(s)}</span>
                                        <span class="font-bold text-slate-700 text-lg">${s.name}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('');
                    
                    document.getElementById('selector-display').innerHTML = `
                        <div class="w-full h-full overflow-y-auto p-2">
                            <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 w-full">${groupsHtml}</div>
                        </div>
                    `;
                };
            });
        }

        // --- Tool: Lunch Choice ---

        function renderLunchChoice() {
            if (!appState.lunchColumns) {
                appState.lunchColumns = {
                    unselected: [...appState.students.filter(s => s.isPresent)],
                    choice1: [], choice2: [], choice3: []
                };
            }
            const cols = appState.lunchColumns;
            const menu = appState.lunchMenu;

            const makeDraggable = (student, colId) => {
                // Ensure touch-action is none to allow custom drag handling
                return `
                <div id="st-${student.id}" draggable="true" 
                     data-id="${student.id}" data-col="${colId}"
                     style="touch-action: none;"
                     class="draggable-item bg-white border-2 border-slate-200 p-2 md:p-3 rounded-xl cursor-grab active:cursor-grabbing shadow-sm hover:shadow-md hover:border-crayon-blue flex flex-col items-center w-28 md:w-32 transition-all animate-pop-in select-none">
                    <div class="text-4xl mb-1 pointer-events-none">${getStudentEmoji(student)}</div>
                    <div class="font-black text-slate-700 text-base md:text-lg text-center leading-tight pointer-events-none truncate w-full">${student.name}</div>
                </div>`;
            };

            const colTemplate = (id, colorClass, title, items, isInput = false, placeholder = "") => {
                let currentEmoji = '';
                if (isInput) {
                    const text = menu[id+'Menu'] || '';
                    const words = text.toLowerCase().split(/\s+/);
                    for (let i = words.length - 1; i >= 0; i--) {
                        if (FOOD_EMOJIS[words[i]]) {
                            currentEmoji = FOOD_EMOJIS[words[i]];
                            break;
                        }
                    }
                }

                return `
                <div id="drop-${id}" class="dropzone flex flex-col h-full bg-white rounded-3xl border-4 ${colorClass} overflow-hidden shadow-sm transition-all duration-200">
                    <div class="p-3 ${colorClass.replace('border-', 'bg-')} bg-opacity-10 text-center flex-shrink-0">
                        ${isInput 
                            ? `
                            <div class="relative w-full">
                                <input id="input-${id}" value="${menu[id+'Menu'] || ''}" placeholder="${placeholder}" class="w-full bg-white/60 border-2 border-white/50 focus:border-white rounded-2xl py-2 pl-3 pr-12 text-center font-black text-xl text-slate-700 focus:outline-none placeholder-slate-400/70 shadow-sm">
                                <div id="emoji-display-${id}" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-3xl transition-all duration-300 ${currentEmoji ? 'scale-100 opacity-100' : 'scale-50 opacity-0'} pointer-events-none filter drop-shadow-sm">${currentEmoji}</div>
                            </div>
                            `
                            : `<h3 class="font-black text-2xl text-slate-700 uppercase tracking-wide py-1">${title}</h3>`
                        }
                        <div class="inline-block bg-white px-3 py-0.5 rounded-full text-sm font-bold text-slate-500 mt-2 shadow-sm">${items.length}</div>
                    </div>
                    <div class="flex-grow p-3 bg-slate-50/50 flex flex-wrap content-start gap-3 overflow-y-auto min-h-0">
                        ${items.map(s => makeDraggable(s, id)).join('')}
                    </div>
                </div>
            `};

            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col p-4 md:p-6 overflow-hidden gap-4">
                    <div class="flex justify-between items-center flex-shrink-0">
                        <h2 class="text-3xl font-black text-slate-800 flex items-center gap-3">
                            <span class="bg-orange-100 p-2 rounded-xl text-orange-500"><i data-lucide="utensils"></i></span> 
                            Lunch Count
                        </h2>
                        <button id="reset-lunch" class="text-base font-bold text-red-500 hover:text-white hover:bg-red-500 border-2 border-red-500 px-5 py-2 rounded-xl transition-all">Reset Board</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 flex-grow min-h-0">
                        ${colTemplate('choice1', 'border-crayon-blue', 'Option A', cols.choice1, true, 'Pizza 🍕')}
                        ${colTemplate('choice2', 'border-crayon-green', 'Option B', cols.choice2, true, 'Salad 🥗')}
                        ${colTemplate('choice3', 'border-crayon-orange', 'Home Lunch 🥪', cols.choice3, false)}
                    </div>

                    <div class="flex-shrink-0 min-h-[130px] bg-slate-100 rounded-3xl p-4 border-4 border-slate-300 border-dashed relative">
                        <div class="absolute -top-4 left-6 bg-slate-300 text-white px-4 py-0.5 rounded-full font-bold uppercase text-xs tracking-wider">Waiting to Choose</div>
                        <div id="drop-unselected" class="dropzone flex flex-wrap gap-3 mt-1 h-full items-center pl-2 overflow-x-auto">
                            ${cols.unselected.length > 0 ? cols.unselected.map(s => makeDraggable(s, 'unselected')).join('') : '<div class="w-full text-center text-slate-400 font-bold italic">All done!</div>'}
                        </div>
                    </div>
                </div>
            `;

            // --- Mouse Drag Logic ---
            let draggedItem = null;
            let sourceCol = null;

            const handleDragStart = (e) => {
                draggedItem = e.target;
                sourceCol = e.target.dataset.col;
                e.target.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            };

            const handleDragEnd = (e) => {
                if(e.target) e.target.classList.remove('dragging');
                document.querySelectorAll('.dropzone').forEach(d => d.classList.remove('dropzone-active'));
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                const zone = e.target.closest('.dropzone');
                if (zone) zone.classList.add('dropzone-active');
            };
            
            const handleDragLeave = (e) => {
                const zone = e.target.closest('.dropzone');
                if (zone) zone.classList.remove('dropzone-active');
            };

            const handleDrop = (e) => {
                e.preventDefault();
                const zone = e.target.closest('.dropzone');
                if (!zone || !draggedItem) return;
                
                const targetId = zone.id.replace('drop-', '');
                if (targetId === sourceCol) return;

                const studentId = draggedItem.dataset.id;
                moveStudent(sourceCol, targetId, studentId);
            };

            // --- Smartboard / Touch Logic (Custom Implementation) ---
            let activeTouchEl = null;
            let touchOffsetX = 0;
            let touchOffsetY = 0;
            let originalSourceEl = null;

            const handleTouchStart = (e) => {
                const item = e.target.closest('.draggable-item');
                if (!item) return;
                
                // Prevent scrolling while dragging a student
                e.preventDefault(); 
                
                originalSourceEl = item;
                sourceCol = item.dataset.col;
                
                // Create a clone for visual feedback
                activeTouchEl = item.cloneNode(true);
                activeTouchEl.classList.remove('draggable-item'); // Remove listener class to avoid loops
                activeTouchEl.classList.add('touch-dragging');
                activeTouchEl.style.width = item.offsetWidth + 'px';
                activeTouchEl.style.height = item.offsetHeight + 'px';
                
                const touch = e.touches[0];
                const rect = item.getBoundingClientRect();
                touchOffsetX = touch.clientX - rect.left;
                touchOffsetY = touch.clientY - rect.top;
                
                activeTouchEl.style.left = (touch.clientX - touchOffsetX) + 'px';
                activeTouchEl.style.top = (touch.clientY - touchOffsetY) + 'px';
                
                document.body.appendChild(activeTouchEl);
                item.style.opacity = '0.3'; // Dim original
            };

            const handleTouchMove = (e) => {
                if (!activeTouchEl) return;
                e.preventDefault(); // Critical for stopping scroll
                const touch = e.touches[0];
                
                activeTouchEl.style.left = (touch.clientX - touchOffsetX) + 'px';
                activeTouchEl.style.top = (touch.clientY - touchOffsetY) + 'px';
                
                // With pointer-events: none on the activeTouchEl, we can see through it
                document.querySelectorAll('.dropzone').forEach(d => d.classList.remove('dropzone-active'));
                
                let elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                let zone = elemBelow ? elemBelow.closest('.dropzone') : null;
                
                if (zone) zone.classList.add('dropzone-active');
            };

            const handleTouchEnd = (e) => {
                if (!activeTouchEl) return;
                e.preventDefault();
                
                const touch = e.changedTouches[0];
                
                // With pointer-events: none, elementFromPoint works directly
                let elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                
                // Cleanup visual
                activeTouchEl.remove();
                activeTouchEl = null;
                if(originalSourceEl) originalSourceEl.style.opacity = '1';
                
                document.querySelectorAll('.dropzone').forEach(d => d.classList.remove('dropzone-active'));
                
                // Logic
                let zone = elemBelow ? elemBelow.closest('.dropzone') : null;
                if (zone && originalSourceEl) {
                    const targetId = zone.id.replace('drop-', '');
                    if (targetId !== sourceCol) {
                         const studentId = originalSourceEl.dataset.id;
                         moveStudent(sourceCol, targetId, studentId);
                    }
                }
                originalSourceEl = null;
            };

            const moveStudent = (fromCol, toCol, sId) => {
                const student = appState.lunchColumns[fromCol].find(s => s.id === sId);
                if(student) {
                    appState.lunchColumns[fromCol] = appState.lunchColumns[fromCol].filter(s => s.id !== sId);
                    appState.lunchColumns[toCol].push(student);
                    renderLunchChoice();
                }
            }

            // Bind Events
            toolDisplay.querySelectorAll('.draggable-item').forEach(el => {
                // Mouse
                el.addEventListener('dragstart', handleDragStart);
                el.addEventListener('dragend', handleDragEnd);
                // Touch
                el.addEventListener('touchstart', handleTouchStart, {passive: false});
                el.addEventListener('touchmove', handleTouchMove, {passive: false});
                el.addEventListener('touchend', handleTouchEnd);
            });

            toolDisplay.querySelectorAll('.dropzone').forEach(el => {
                el.addEventListener('dragover', handleDragOver);
                el.addEventListener('dragleave', handleDragLeave);
                el.addEventListener('drop', handleDrop);
            });
            
            ['choice1', 'choice2'].forEach(key => {
                const input = document.getElementById(`input-${key}`);
                const emojiDisplay = document.getElementById(`emoji-display-${key}`);
                
                if (input) {
                    input.oninput = (e) => {
                        const val = e.target.value;
                        appState.lunchMenu[`${key}Menu`] = val;
                        
                        const words = val.toLowerCase().split(/\s+/);
                        let foundEmoji = '';
                        for (let i = words.length - 1; i >= 0; i--) {
                            if (FOOD_EMOJIS[words[i]]) {
                                foundEmoji = FOOD_EMOJIS[words[i]];
                                break;
                            }
                        }

                        if (emojiDisplay) {
                            emojiDisplay.textContent = foundEmoji;
                            if (foundEmoji) {
                                emojiDisplay.classList.remove('scale-50', 'opacity-0');
                                emojiDisplay.classList.add('scale-100', 'opacity-100');
                            } else {
                                emojiDisplay.classList.remove('scale-100', 'opacity-100');
                                emojiDisplay.classList.add('scale-50', 'opacity-0');
                            }
                        }
                    };
                }
            });

            document.getElementById('reset-lunch').onclick = () => {
                appState.lunchColumns = null;
                appState.lunchMenu = {};
                randomizeEmojis(); 
                renderLunchChoice();
            };
        }

        // --- Tool: Tournament Bracket (Double Elimination) ---

                 const { first, second } = appState.podium;
                content = `

                                <i data-lucide="crown" class="w-12 h-12 md:w-16 md:h-16 text-yellow-500 mb-2 animate-bounce-slow"></i>
                                <div class="text-6xl md:text-8xl mb-4 transform rotate-6">${getStudentEmoji(first)}</div>
                                <div class="text-slate-800 font-black mb-2 text-3xl md:text-4xl">${first.name}</div>
                                <div class="w-36 md:w-48 h-48 md:h-64 bg-yellow-400 rounded-t-2xl border-4 border-yellow-500 flex items-center justify-center text-6xl md:text-8xl font-black text-white shadow-xl">1</div>

            if (genBtn) genBtn.onclick = generateBracketData;

            const resetBtns = [document.getElementById('reset-bracket'), document.getElementById('reset-bracket-mini')];
            resetBtns.forEach(b => { if(b) b.onclick = () => { appState.bracket = null; appState.podium = null; renderTournamentBracket(); } });
        }

        // --- Double Elimination Generation Logic ---

        function generateBracketData() {
            const players = appState.students.filter(s => s.isPresent).sort(() => Math.random() - 0.5);
            if (players.length < 3) return alert("Need at least 3 players!");

            // Pad to power of 2
            let size = 2;
            while(size < players.length) size *= 2;
            while(players.length < size) players.push({ name: 'BYE', id: 'bye' });

            const matches = [];
            
            // --- Winners Bracket Generation ---
            const totalRounds = Math.log2(size);
            let currentRoundMatches = [];
            
            for(let i=0; i<size/2; i++) {
                const id = `w-1-${i}`;
                const m = { id, type: 'winner', round: 1, players: [players[i], players[size-1-i]], winner: null, nextWin: null, nextLose: null };
                matches.push(m);
                currentRoundMatches.push(m);
            }

            let prevRoundMatches = currentRoundMatches;
            for(let r=2; r<=totalRounds; r++) {
                currentRoundMatches = [];
                for(let i=0; i<prevRoundMatches.length/2; i++) {
                    const id = `w-${r}-${i}`;
                    const m = { id, type: 'winner', round: r, players: [null, null], winner: null, nextWin: null, nextLose: null };
                    matches.push(m);
                    currentRoundMatches.push(m);
                    
                    prevRoundMatches[i*2].nextWin = { id, slot: 0 };
                    prevRoundMatches[i*2+1].nextWin = { id, slot: 1 };
                }
                prevRoundMatches = currentRoundMatches;
            }
            const wbFinalMatch = prevRoundMatches[0];

            // --- Losers Bracket Generation ---
            
            let lbMatchesByRound = {};
            const createLBMatch = (r, idx) => {
                const id = `l-${r}-${idx}`;
                const m = { id, type: 'loser', round: r, players: [null, null], winner: null, nextWin: null };
                matches.push(m);
                if(!lbMatchesByRound[r]) lbMatchesByRound[r] = [];
                lbMatchesByRound[r].push(m);
                return m;
            };

            for(let i=0; i<size/4; i++) createLBMatch(1, i);
            for(let i=0; i<size/4; i++) createLBMatch(2, i);
            for(let i=0; i<size/8; i++) createLBMatch(3, i);
            for(let i=0; i<size/8; i++) createLBMatch(4, i);

            let lbRound = 5;
            let count = size/16;
            while(count >= 1) {
                for(let i=0; i<count; i++) createLBMatch(lbRound, i);
                lbRound++;
                for(let i=0; i<count; i++) createLBMatch(lbRound, i);
                count /= 2;
                lbRound++;
            }
            
            const maxLbRound = lbRound - 1; 
            
            // --- Wiring Losers Logic ---
            const wbR1 = matches.filter(m => m.type === 'winner' && m.round === 1);
            const lbR1 = matches.filter(m => m.type === 'loser' && m.round === 1);
            for(let i=0; i<wbR1.length; i++) {
                const targetMatch = lbR1[Math.floor(i/2)];
                wbR1[i].nextLose = { id: targetMatch.id, slot: i%2 };
            }

            const wbR2 = matches.filter(m => m.type === 'winner' && m.round === 2);
            const lbR2 = matches.filter(m => m.type === 'loser' && m.round === 2);
            const lbR1Matches = matches.filter(m => m.type === 'loser' && m.round === 1);
            
            for(let i=0; i<lbR1Matches.length; i++) lbR1Matches[i].nextWin = { id: lbR2[i].id, slot: 0 };
            for(let i=0; i<wbR2.length; i++) wbR2[i].nextLose = { id: lbR2[i].id, slot: 1 };

            let currentLbR = 2;
            let currentWbR = 3;
            
            while(currentLbR < maxLbRound) {
                const sourceMatches = matches.filter(m => m.type === 'loser' && m.round === currentLbR);
                const targetMatches = matches.filter(m => m.type === 'loser' && m.round === currentLbR+1);
                for(let i=0; i<sourceMatches.length; i++) {
                    targetMatches[Math.floor(i/2)].players[i%2] = null;
                    sourceMatches[i].nextWin = { id: targetMatches[Math.floor(i/2)].id, slot: i%2 };
                }
                currentLbR++;

                if (currentLbR >= maxLbRound) break;
                
                const internalSource = matches.filter(m => m.type === 'loser' && m.round === currentLbR);
                const dropSource = matches.filter(m => m.type === 'winner' && m.round === currentWbR);
                const destMatches = matches.filter(m => m.type === 'loser' && m.round === currentLbR+1);

                if(destMatches.length > 0) {
                    for(let i=0; i<internalSource.length; i++) internalSource[i].nextWin = { id: destMatches[i].id, slot: 0 };
                    for(let i=0; i<dropSource.length; i++) dropSource[i].nextLose = { id: destMatches[i].id, slot: 1 };
                }
                
                currentLbR++;
                currentWbR++;
            }

            const finalId = 'grand-final';
            const grandFinal = { id: finalId, type: 'final', round: 1, players: [null, null], winner: null };
            matches.push(grandFinal);
            
            wbFinalMatch.nextWin = { id: finalId, slot: 0 };
            const lbFinalMatch = matches.filter(m => m.type === 'loser' && m.round === maxLbRound)[0];
            if(lbFinalMatch) lbFinalMatch.nextWin = { id: finalId, slot: 1 };
            
            if(lbFinalMatch) {
               wbFinalMatch.nextLose = { id: lbFinalMatch.id, slot: 1 };
               const prevLb = matches.filter(m => m.type === 'loser' && m.round === maxLbRound-1);
               if(prevLb.length === 1) prevLb[0].nextWin = { id: lbFinalMatch.id, slot: 0 };
            }

            appState.bracket = { matches };
            
            matches.forEach(m => {
                const byeIdx = m.players.findIndex(p => p && p.id === 'bye');
                if (byeIdx !== -1) {
                    const realPlayerIdx = byeIdx === 0 ? 1 : 0;
                    if(m.players[realPlayerIdx] && m.players[realPlayerIdx].id !== 'bye') {
                       window.advanceBracket(m.id, m.players[realPlayerIdx].id); 
                    }
                }
            });
            
            renderTournamentBracket();
        }

        window.advanceBracket = (matchId, winnerId) => {
            const matches = appState.bracket.matches;
            const match = matches.find(m => m.id === matchId);
            if (!match || match.winner) return;

            const winner = match.players.find(p => p.id === winnerId);
            const loser = match.players.find(p => p.id !== winnerId);
            match.winner = winner;

            if (match.type !== 'final' && match.type !== 'final-reset') {
                if (match.nextWin) {
                    const nextM = matches.find(m => m.id === match.nextWin.id);
                    if (nextM) nextM.players[match.nextWin.slot] = winner;
                }
                if (match.nextLose) {
                    const nextM = matches.find(m => m.id === match.nextLose.id);
                    if (nextM) nextM.players[match.nextLose.slot] = loser;
                }
            }
            
            if (match.id === 'grand-final') {
                if (match.players[0].id === winner.id) {
                    appState.podium = { first: winner, second: loser };
                } else {
                    if (!matches.find(m => m.id === 'grand-final-reset')) {
                        matches.push({
                            id: 'grand-final-reset',
                            type: 'final-reset',
                            round: 2,
                            players: [winner, loser],
                            winner: null
                        });
                    }
                }
            }
            
            if (match.id === 'grand-final-reset') {
                appState.podium = { first: winner, second: loser };
                triggerConfetti();
            }

            renderTournamentBracket();
        };

        // --- Tool: Hangman ---

        function renderHangman(state) {
            const WORDS = ["DINOSAUR", "ASTRONAUT", "BUTTERFLY", "RAINBOW", "VACATION", "CUPCAKE", "ADVENTURE", "LIBRARY", "SOCCER"];
            
            if (!state) {
                state = {
                    word: WORDS[Math.floor(Math.random() * WORDS.length)],
                    guesses: [],
                    status: 'playing' 
                };
            }
            
            const wrongs = state.guesses.filter(l => !state.word.includes(l)).length;
            const maxWrongs = 6;
            
            if (state.status === 'playing') {
                if (wrongs >= maxWrongs) state.status = 'lost';
                else if (state.word.split('').every(l => state.guesses.includes(l))) state.status = 'won';
            }

            const drawPath = (d, show) => `<path d="${d}" stroke="#334155" stroke-width="6" stroke-linecap="round" fill="none" class="transition-all duration-500 ${show ? 'opacity-100' : 'opacity-0 dashed-line'}" />`;
            const parts = [
                "M140,100 A20,20 0 1,1 100,100 A20,20 0 1,1 140,100", 
                "M120,120 L120,200", 
                "M120,140 L90,180", 
                "M120,140 L150,180", 
                "M120,200 L90,250", 
                "M120,200 L150,250"
            ];

            const keyboard = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').map(char => {
                const used = state.guesses.includes(char);
                const isCorrect = state.word.includes(char);
                let color = "bg-white border-b-4 border-slate-300 text-slate-700 hover:bg-slate-50";
                if (used && isCorrect) color = "bg-green-500 border-green-700 text-white transform translate-y-1 border-b-0";
                if (used && !isCorrect) color = "bg-slate-200 border-slate-200 text-slate-400 transform translate-y-1 border-b-0";

                return `<button class="w-12 h-16 md:w-16 md:h-20 rounded-xl font-black text-2xl transition-all ${color}" data-char="${char}" ${used || state.status !== 'playing' ? 'disabled' : ''}>${char}</button>`;
            }).join('');

            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col lg:flex-row gap-8 p-6 items-center justify-center">
                    
                    <div class="flex-grow flex flex-col items-center max-w-4xl w-full">
                        
                        <div class="flex flex-col md:flex-row items-center gap-12 mb-8">
                             <div class="relative w-64 h-64 bg-yellow-50 rounded-3xl border-4 border-yellow-200 shadow-inner">
                                <svg viewBox="0 0 300 300" class="w-full h-full">
                                    <path d="M20,280 L280,280 M60,280 L60,40 L180,40 M180,40 L180,80" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" fill="none" />
                                    ${parts.map((d, i) => drawPath(d, wrongs > i)).join('')}
                                </svg>
                            </div>
                            
                            <div class="flex flex-col items-center">
                                <div class="flex flex-wrap gap-3 justify-center mb-6">
                                    ${state.word.split('').map(char => `
                                        <div class="w-14 h-20 flex items-center justify-center border-b-8 ${state.guesses.includes(char) ? 'border-slate-800 text-slate-800' : 'border-slate-300 text-transparent'} text-6xl font-black bg-white/50 rounded-t-xl">
                                            ${state.guesses.includes(char) || state.status === 'lost' ? char : '_'}
                                        </div>
                                    `).join('')}
                                </div>
                                ${state.status !== 'playing' ? `
                                    <div class="animate-pop-in text-center bg-white p-6 rounded-3xl border-4 ${state.status === 'won' ? 'border-green-400' : 'border-red-400'} shadow-xl">
                                        <h3 class="text-4xl font-black ${state.status === 'won' ? 'text-green-500' : 'text-red-500'} mb-2">
                                            ${state.status === 'won' ? '🎉 YOU DID IT! 🎉' : '🙈 OOPS! TRY AGAIN!'}
                                        </h3>
                                        <button id="restart-hangman" class="px-8 py-3 bg-slate-800 hover:bg-black text-white font-bold rounded-xl transition-all text-xl mt-2">New Game</button>
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        <div class="flex flex-wrap gap-3 justify-center">
                            ${keyboard}
                        </div>

                    </div>
                </div>
            `;

            toolDisplay.querySelectorAll('button[data-char]').forEach(btn => {
                btn.onclick = () => {
                    const char = btn.dataset.char;
                    state.guesses.push(char);
                    renderHangman(state);
                };
            });

            const rBtn = document.getElementById('restart-hangman');
            if (rBtn) rBtn.onclick = () => renderHangman(null);
        }

        // --- Helpers ---
        function triggerConfetti() {
            // Simple DOM confetti
            for(let i=0; i<30; i++) {
                const c = document.createElement('div');
                c.className = 'fixed w-4 h-4 rounded-sm z-50 pointer-events-none';
                c.style.backgroundColor = ['#facc15', '#ef4444', '#3b82f6', '#22c55e', '#a855f7'][Math.floor(Math.random()*5)];
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-10px';
                c.style.transform = `rotate(${Math.random()*360}deg)`;
                document.body.appendChild(c);
                
                const anim = c.animate([
                    { transform: `translateY(0vh) rotate(0deg)`, opacity: 1 },
                    { transform: `translateY(100vh) rotate(${720}deg)`, opacity: 0 }
                ], { duration: 2000 + Math.random()*2000, easing: 'linear' });
                
                anim.onfinish = () => c.remove();
            }
        }

        function setupFullscreen() {
            const btn = document.getElementById('fullscreen-btn');
            const container = document.getElementById('app-container');
            
            btn.onclick = async () => {
                if (!document.fullscreenElement) {
                    try {
                        if (container.requestFullscreen) {
                            await container.requestFullscreen();
                        } else {
                            throw new Error("No FS API");
                        }
                    } catch (e) {
                        console.log("Fullscreen blocked/unavailable, using CSS fallback");
                        container.classList.add('viewport-fullscreen');
                    }
                } else {
                    try {
                        if (document.exitFullscreen) {
                            await document.exitFullscreen();
                        }
                    } catch (e) {
                        // ignore
                    }
                    container.classList.remove('viewport-fullscreen');
                }
            };
        }

        init();

    </script>
