    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        display: ['"Fredoka One"', 'cursive'],
                    },
                    colors: {
                        paper: '#ffffff',
                        board: '#fffbeb', /* Warm Amber-50 */
                        crayon: {
                            blue: '#3b82f6',   
                            yellow: '#eab308',
                            green: '#22c55e',
                            red: '#ef4444',
                            purple: '#a855f7',
                            orange: '#f97316',
                            pink: '#ec4899',
                            dark: '#1e293b' // Slate 800 for outlines
                        },
                        monster: {
                            a: '#3b82f6', // Bright Blue
                            b: '#22c55e', // Bright Green
                            c: '#a855f7'  // Bright Purple (was orange/gray)
                        }
                    },
                    boxShadow: {
                        /* Bold, solid shadows for the cartoon effect */
                        'cartoon': '8px 8px 0px 0px #1e293b',
                        'tactile': '4px 4px 0px 0px #1e293b',
                        'tactile-hover': '6px 6px 0px 0px #1e293b',
                        'tactile-active': '0px 0px 0px 0px #1e293b',
                        'inner-deep': 'inset 0 6px 0px 0px rgba(0, 0, 0, 0.15)',
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                        'pop-in': 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'blink': 'blink 4s infinite',
                        'chew': 'chew 0.4s ease-in-out',
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        },
                        popIn: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        blink: {
                            '0%, 96%, 98%, 100%': { transform: 'scaleY(1)' },
                            '97%, 99%': { transform: 'scaleY(0.1)' }
                        },
                        chew: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(0.95) translateY(5px)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            /* Vibrant Yellow Polka Dot Background */
            background-color: #fde047; /* Yellow 300 */
            background-image: radial-gradient(#facc15 15%, transparent 15%); /* Yellow 400 dots */
            background-size: 30px 30px;
            color: #1e293b;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        #app-container:fullscreen {
            width: 100vw; height: 100vh; overflow: hidden;
        }

        /* Thick borders and solid shadows make it look like a comic book */
        .fun-panel {
            background: white;
            border-radius: 24px;
            border: 4px solid #1e293b;
            box-shadow: 8px 8px 0px 0px #1e293b;
        }

        .btn-tactile {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 4px 0px 0px #1e293b;
            transform: translateY(0);
        }
        .btn-tactile:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px 0px #1e293b;
        }
        .btn-tactile:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px 0px transparent;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 14px; height: 14px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 20px; border: 3px solid white; }
        ::-webkit-scrollbar-thumb:hover { background-color: #334155; }

        /* Dragging visuals */
        .dragging { opacity: 0.5; transform: scale(0.95) rotate(-2deg); }
        
        .touch-dragging {
            position: fixed; z-index: 2147483647; pointer-events: none;
            opacity: 1; transform: scale(1.15) rotate(-5deg); 
            box-shadow: 10px 10px 0px 0px rgba(30,41,59,0.4);
            border: 4px solid #1e293b; border-radius: 24px; background: white;
        }
        
        /* Monster Styles */
        .monster-mouth { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .dropzone-active .monster-mouth { 
            height: 100px !important; 
            border-radius: 50px !important;
            background-color: #0f172a !important;
        }
        .dropzone-active .monster-face { transform: scale(1.02); }
        .dropzone.chewing .monster-face { animation: chew 0.4s ease-in-out; }
    </style>
</head>

        function getStudentEmoji(student) {
            if (appState.emojiMap[student.id]) return appState.emojiMap[student.id];
            
            // Combine the student's name with today's date string (e.g., "SkylarFri Feb 20 2026")
            // This ensures the emoji changes daily, but stays consistent all day long!
            const todayStr = new Date().toDateString();
            const seedString = student.name + todayStr;
            
            let hash = 0; 
            for (let i = 0; i < seedString.length; i++) {
                hash = seedString.charCodeAt(i) + ((hash << 5) - hash);
            }
            
            const emoji = AVATARS[Math.abs(hash) % AVATARS.length];
            appState.emojiMap[student.id] = emoji;
            return emoji;
        }

        function fallbackToLocal() {

            if (!appState.userId) return;
            const ref = doc(db, `artifacts/${appId}/users/${appState.userId}/settings`, 'roster');

                const snap = await getDoc(ref);

            const menu = appState.lunchMenu;
            const total = cols.choice1.length + cols.choice2.length + cols.choice3.length + cols.unselected.length;

                <div class="h-full flex flex-row overflow-hidden relative">
                    
                    <!-- Left Sidebar: Students (Yellow Tray) -->
                    <div class="w-1/3 max-w-[300px] bg-white border-r-4 border-slate-800 flex flex-col z-20 shadow-[8px_0px_0px_#1e293b]">
                        <div class="p-4 bg-crayon-yellow border-b-4 border-slate-800 flex justify-between items-center shadow-sm z-10">
                            <h2 class="font-display text-2xl text-slate-900">Waiting <span class="bg-white px-2 py-1 rounded-lg border-2 border-slate-800 shadow-tactile ml-1">${cols.unselected.length}</span></h2>
                            <button id="reset-lunch" class="p-2 bg-white text-red-500 rounded-xl hover:bg-red-500 hover:text-white border-2 border-slate-800 shadow-tactile transition-colors" title="Reset Board"><i data-lucide="rotate-ccw" class="w-6 h-6"></i></button>
                        </div>
                        <div id="drop-unselected" class="dropzone flex-grow overflow-y-auto p-4 flex flex-col gap-3 no-scrollbar bg-yellow-50/50">
                            ${cols.unselected.length > 0 ? cols.unselected.map(s => makeDraggable(s, 'unselected')).join('') : 
                              '<div class="text-center text-slate-400 font-display text-2xl mt-10 opacity-50">All done!</div>'}
                        </div>
                    </div>

                    <!-- Right Area: Menus & Monsters -->
                    <div class="flex-grow flex flex-col p-4 md:p-6 bg-transparent gap-5 h-full z-10">
                        
                        <!-- Header & Sides Bar -->
                        <div class="flex flex-col gap-4 mb-2">
                            <div class="flex justify-between items-center">
                                <h2 class="text-4xl md:text-5xl font-display text-slate-800 tracking-tight" style="-webkit-text-stroke: 1px white;">Daily <span class="text-crayon-orange">Menu</span></h2>
                                
                                <div class="flex items-center gap-3 md:gap-4 bg-white px-3 py-2 rounded-[2rem] border-4 border-slate-800 shadow-tactile">
                                    <button onclick="window.changeMenuDate(-1)" class="p-3 hover:bg-crayon-yellow rounded-2xl text-slate-800 transition-colors border-4 border-transparent hover:border-slate-800 btn-tactile"><i data-lucide="chevron-left" class="w-7 h-7 md:w-8 md:h-8"></i></button>
                                    <div class="flex flex-col items-center justify-center w-40 md:w-56 select-none">
                                        <div class="font-display text-2xl md:text-4xl text-crayon-blue tracking-wide uppercase drop-shadow-sm leading-tight">${dayName}</div>
                                        <div class="font-bold text-slate-500 text-sm md:text-lg uppercase tracking-widest">${monthDate}</div>
                                    </div>
                                    <button onclick="window.changeMenuDate(1)" class="p-3 hover:bg-crayon-yellow rounded-2xl text-slate-800 transition-colors border-4 border-transparent hover:border-slate-800 btn-tactile"><i data-lucide="chevron-right" class="w-7 h-7 md:w-8 md:h-8"></i></button>
                                </div>
                            </div>

                            <div class="bg-crayon-blue rounded-2xl p-3 md:p-4 shadow-tactile flex items-center gap-4 overflow-x-auto no-scrollbar border-4 border-slate-800">
                                <div class="text-white font-display tracking-widest uppercase text-base md:text-lg flex-shrink-0 mr-1 drop-shadow-md"><i data-lucide="utensils-crossed" class="w-5 h-5 inline-block mb-1"></i> Sides:</div>
                                ${sidesHtml}
                            </div>
                        </div>

                        <!-- The Monsters -->
                        <div class="flex flex-row gap-5 md:gap-6 flex-grow min-h-0 items-stretch">
                            ${monsterTemplate('choice1', 'bg-monster-a', 'bg-blue-50', 'Option A', cols.choice1, true)}
                            ${monsterTemplate('choice2', 'bg-monster-b', 'bg-green-50', 'Option B', cols.choice2, true)}
                            ${monsterTemplate('choice3', 'bg-monster-c', 'bg-purple-50', 'Home Lunch', cols.choice3, false)}
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();

            window.changeMenuDate = (dir) => {
                const idx = DATES.indexOf(appState.currentMenuDate);
                let newIdx = idx + dir;
                if(newIdx < 0) newIdx = 0;
                if(newIdx >= DATES.length) newIdx = DATES.length - 1;
                
                if (newIdx !== idx) {
                    if(appState.lunchColumns && (appState.lunchColumns.choice1.length > 0 || appState.lunchColumns.choice2.length > 0 || appState.lunchColumns.choice3.length > 0)) {
                        if(!confirm("Change date and reset the board?")) return;
                    }
                    appState.currentMenuDate = DATES[newIdx];
                    appState.lunchColumns = null;
                    renderLunchChoice();
                }
            };

            window.openMenuPicker = (choiceId) => {
                const optionsHtml = MENU_OPTIONS.map((opt, i) => `
                    <button onclick="window.selectMenu('${choiceId}', ${i})" class="flex flex-col items-center justify-center p-4 bg-white border-4 border-slate-800 rounded-2xl hover:bg-crayon-yellow btn-tactile">
                        <span class="text-5xl md:text-6xl mb-3 drop-shadow-md">${opt.emoji}</span>
                        <span class="font-bold text-slate-800 text-base md:text-lg text-center leading-tight tracking-wide">${opt.name}</span>
                    </button>
                `).join('');
                showModal(`
                    <h3 class="text-4xl font-display text-slate-800 mb-8 text-center" style="-webkit-text-stroke: 1px white;">Override Menu Option</h3>
                    <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5 max-h-[60vh] overflow-y-auto p-4 no-scrollbar bg-slate-100 rounded-[24px] border-4 border-slate-800 shadow-inner">${optionsHtml}</div>
                `);
            };

            window.selectMenu = (choiceId, optionIndex) => {
                appState.lunchMenu[choiceId] = MENU_OPTIONS[optionIndex];
                document.getElementById('modal-container').classList.add('hidden');
                renderLunchChoice(); 
            };

            let draggedItem = null, sourceCol = null, activeTouchEl = null, originalSourceEl = null;

            const handleDragStart = (e) => { draggedItem = e.target; sourceCol = e.target.dataset.col; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; };
            const handleDragEnd = (e) => { if(e.target) e.target.classList.remove('dragging'); cleanupDrops(); };
            const handleDragOver = (e) => { e.preventDefault(); const zone = e.target.closest('.dropzone'); if(zone) zone.classList.add('dropzone-active'); };
            const handleDragLeave = (e) => { const zone = e.target.closest('.dropzone'); if(zone) zone.classList.remove('dropzone-active'); };
            const handleDrop = (e) => {
                e.preventDefault(); const zone = e.target.closest('.dropzone');
                if (!zone || !draggedItem) return;
                const targetId = zone.id.replace('drop-', '');
                if (targetId !== sourceCol) performMove(sourceCol, targetId, draggedItem.dataset.id, zone);
            };

            const handleTouchStart = (e) => {
                const item = e.target.closest('.draggable-item'); if (!item) return;
                e.preventDefault(); originalSourceEl = item; sourceCol = item.dataset.col;
                activeTouchEl = item.cloneNode(true); activeTouchEl.classList.remove('draggable-item'); activeTouchEl.classList.add('touch-dragging');
                activeTouchEl.style.width = item.offsetWidth + 'px';
                document.body.appendChild(activeTouchEl); item.style.opacity = '0.3';
                moveTouchClone(e.touches[0]);
            };
            const moveTouchClone = (touch) => {
                if(!activeTouchEl) return;
                activeTouchEl.style.left = (touch.clientX - (activeTouchEl.offsetWidth/2)) + 'px';
                activeTouchEl.style.top = (touch.clientY - (activeTouchEl.offsetHeight/2) - 40) + 'px'; 
            }
            const handleTouchMove = (e) => {
                if (!activeTouchEl) return; e.preventDefault(); moveTouchClone(e.touches[0]);
                document.querySelectorAll('.dropzone').forEach(d => d.classList.remove('dropzone-active'));
                const elemBelow = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
                if(elemBelow) { const zone = elemBelow.closest('.dropzone'); if(zone) zone.classList.add('dropzone-active'); }
            };
            const handleTouchEnd = (e) => {
                if (!activeTouchEl) return; e.preventDefault();
                const touch = e.changedTouches[0];
                const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
                activeTouchEl.remove(); activeTouchEl = null; if(originalSourceEl) originalSourceEl.style.opacity = '1';
                cleanupDrops();
                if(elemBelow && originalSourceEl) {
                    const zone = elemBelow.closest('.dropzone');
                    if(zone) {
                        const targetId = zone.id.replace('drop-', '');
                        if(targetId !== sourceCol) performMove(sourceCol, targetId, originalSourceEl.dataset.id, zone);
                    }
                }
            };

            const cleanupDrops = () => document.querySelectorAll('.dropzone').forEach(d => { d.classList.remove('dropzone-active'); d.classList.remove('chewing'); });

            const performMove = (fromCol, toCol, sId, zone) => {
                const student = appState.lunchColumns[fromCol].find(s => s.id === sId);
                if(student) {
                    zone.classList.add('chewing');
                    appState.lunchColumns[fromCol] = appState.lunchColumns[fromCol].filter(s => s.id !== sId);
                    appState.lunchColumns[toCol].push(student);
                    if (appState.lunchColumns.unselected.length === 0 && fromCol === 'unselected') triggerConfetti();
                    setTimeout(renderLunchChoice, 300); 
                }
            };

            toolDisplay.querySelectorAll('.draggable-item').forEach(el => {
                el.addEventListener('dragstart', handleDragStart); el.addEventListener('dragend', handleDragEnd);
                el.addEventListener('touchstart', handleTouchStart, {passive: false});
                el.addEventListener('touchmove', handleTouchMove, {passive: false});
                el.addEventListener('touchend', handleTouchEnd);
            });
            toolDisplay.querySelectorAll('.dropzone').forEach(el => {
                el.addEventListener('dragover', handleDragOver); el.addEventListener('dragleave', handleDragLeave); el.addEventListener('drop', handleDrop);
            });

            document.getElementById('reset-lunch').onclick = () => { appState.lunchColumns = null; renderLunchChoice(); };
        }

        // --- 2. QUIET CRITTER ---
        function renderNoiseMeter() {
            let isListening = false;
            
            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center p-6 text-center animate-pop-in relative bg-white">
                    <h2 class="text-6xl md:text-7xl font-display text-slate-800 mb-4" style="-webkit-text-stroke: 1px white;">Quiet Critter</h2>
                    <p class="text-slate-800 mb-8 max-w-lg text-2xl font-bold bg-crayon-yellow px-6 py-2 rounded-2xl border-4 border-slate-800 shadow-tactile">Shhh... Keep it down so he can sleep!</p>
                    
                    <div class="relative w-80 h-80 md:w-[400px] md:h-[400px] mb-12">
                        <div id="critter-sleep" class="absolute inset-0 flex items-center justify-center transition-opacity duration-500">
                            <div class="text-[12rem] md:text-[15rem] animate-float drop-shadow-2xl">😴</div>
                            <div class="absolute top-10 right-0 text-6xl animate-pulse text-slate-300 font-display">Zzz</div>
                        </div>
                        <div id="critter-awake" class="absolute inset-0 flex items-center justify-center transition-opacity duration-200 opacity-0 scale-95">
                            <div class="text-[12rem] md:text-[15rem] drop-shadow-2xl">😳</div>
                        </div>
                        <div id="critter-angry" class="absolute inset-0 flex items-center justify-center transition-opacity duration-200 opacity-0 scale-105">
                            <div class="text-[12rem] md:text-[15rem] animate-bounce-slow drop-shadow-2xl">😫</div>
                        </div>
                    </div>

                    <div class="w-full max-w-2xl h-16 bg-white rounded-full overflow-hidden border-4 border-slate-800 shadow-[inset_0_4px_8px_rgba(0,0,0,0.2)] relative">
                        <div id="volume-fill" class="h-full bg-green-400 w-0 transition-all duration-75 ease-out border-r-4 border-slate-800"></div>
                        <div class="absolute top-0 bottom-0 w-2 bg-slate-800 left-[75%]"></div>
                        <div class="absolute top-0 bottom-0 left-[75%] ml-4 flex items-center text-red-500 font-black text-xl">WAKE UP ZONE!</div>
                    </div>

                    <button id="toggle-mic" class="mt-10 btn-tactile bg-crayon-pink text-white px-10 py-5 rounded-3xl font-black text-2xl flex items-center gap-3 border-4 border-slate-800">
                        <i data-lucide="mic" class="w-8 h-8"></i> Start Listening
                    </button>
                    <p id="mic-error" class="text-red-500 font-bold mt-4 hidden">Microphone access denied.</p>
                </div>
            `;

            const btn = document.getElementById('toggle-mic');
            const fill = document.getElementById('volume-fill');
            const [sleepEl, awakeEl, angryEl] = ['sleep', 'awake', 'angry'].map(s => document.getElementById(`critter-${s}`));
            let animationFrameId;

            const updateCritter = (vol) => {
                fill.style.width = Math.min(vol, 100) + '%';
                if (vol > 75) {
                    fill.className = 'h-full bg-red-500 transition-all duration-75 border-r-4 border-slate-800';
                    sleepEl.style.opacity = '0'; awakeEl.style.opacity = '0'; angryEl.style.opacity = '1';
                } else if (vol > 35) {
                    fill.className = 'h-full bg-yellow-400 transition-all duration-75 border-r-4 border-slate-800';
                    sleepEl.style.opacity = '0'; awakeEl.style.opacity = '1'; angryEl.style.opacity = '0';
                } else {
                    fill.className = 'h-full bg-green-400 transition-all duration-75 border-r-4 border-slate-800';
                    sleepEl.style.opacity = '1'; awakeEl.style.opacity = '0'; angryEl.style.opacity = '0';
                }
            };

            btn.onclick = async () => {
                if (isListening) { cleanupCurrentTool(); renderNoiseMeter(); return; }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    appState.audioStream = stream;
                    appState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const analyser = appState.audioContext.createAnalyser();
                    const microphone = appState.audioContext.createMediaStreamSource(stream);
                    analyser.smoothingTimeConstant = 0.7; analyser.fftSize = 256;
                    microphone.connect(analyser);
                    
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    const checkAudio = () => {
                        if(!appState.audioContext) return;
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0; for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                        updateCritter((sum / dataArray.length) * 2);
                        animationFrameId = requestAnimationFrame(checkAudio);
                    };
                    checkAudio();

                    btn.innerHTML = `<i data-lucide="mic-off"></i> Stop Listening`;
                    btn.classList.replace('bg-crayon-pink', 'bg-slate-300');
                    btn.classList.replace('text-white', 'text-slate-800');
                    isListening = true;
                } catch (err) { document.getElementById('mic-error').classList.remove('hidden'); }
            };
        }

        // --- 3. FOCUS TIMER ---
        function renderTimer() {
            let secondsLeft = 300, totalTime = 300, isRunning = false;
            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;

            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center p-6 bg-white animate-pop-in">
                    <div class="relative w-[320px] h-[320px] md:w-[500px] md:h-[500px] flex items-center justify-center mb-10">
                        <div class="absolute inset-0 rounded-full border-[16px] border-slate-800 bg-white shadow-cartoon"></div>
                        <svg class="absolute inset-0 w-full h-full transform -rotate-90 pointer-events-none drop-shadow-md z-10">
                            <circle id="timer-ring" cx="50%" cy="50%" r="42%" stroke="#ef4444" stroke-width="30" fill="none" stroke-linecap="round" stroke-dasharray="1000" class="transition-all duration-1000 ease-linear" />
                        </svg>
                        <div class="relative z-20 text-center cursor-pointer group bg-white rounded-full p-8 border-4 border-slate-100 hover:bg-slate-50 transition-colors shadow-inner" onclick="window.showTimerSettings()">
                            <div id="time-display" class="font-display text-7xl md:text-[8rem] text-slate-800 tracking-tighter tabular-nums">${formatTime(secondsLeft)}</div>
                        </div>
                    </div>
                    
                    <div class="flex gap-6 items-center">
                        <button onclick="window.addTime(-60)" class="w-20 h-20 rounded-2xl bg-white border-4 border-slate-800 text-slate-800 font-black text-3xl btn-tactile hover:bg-slate-100">-1</button>
                        <button id="timer-toggle" class="btn-tactile bg-crayon-green text-white w-32 h-32 rounded-full flex items-center justify-center shadow-tactile border-4 border-slate-800">
                            <i data-lucide="play" class="w-14 h-14 fill-current ml-2"></i>
                        </button>
                        <button onclick="window.addTime(60)" class="w-20 h-20 rounded-2xl bg-white border-4 border-slate-800 text-slate-800 font-black text-3xl btn-tactile hover:bg-slate-100">+1</button>
                    </div>
                    <button onclick="window.resetTimer()" class="mt-8 text-slate-500 font-bold hover:text-slate-800 bg-slate-100 px-6 py-2 rounded-xl border-2 border-slate-300 hover:border-slate-800 transition-colors">Reset Time</button>
                </div>
            `;

            const ring = document.getElementById('timer-ring');
            const display = document.getElementById('time-display');
            const toggleBtn = document.getElementById('timer-toggle');
            ring.setAttribute("pathLength", "100");

            const updateUI = () => {
                display.innerText = formatTime(secondsLeft);
                const pct = totalTime > 0 ? (secondsLeft / totalTime) * 100 : 0;
                ring.style.strokeDashoffset = 100 - pct;
                ring.setAttribute('stroke', pct < 20 ? '#ef4444' : pct < 50 ? '#eab308' : '#22c55e');
            };

            const tick = () => {
                if (secondsLeft > 0) { secondsLeft--; updateUI(); } 
                else {
                    clearInterval(appState.timerInterval); isRunning = false;
                    toggleBtn.innerHTML = `<i data-lucide="rotate-ccw" class="w-14 h-14"></i>`;
                    toggleBtn.className = "btn-tactile bg-slate-800 text-white w-32 h-32 rounded-full flex items-center justify-center shadow-tactile border-4 border-slate-900 animate-pulse";
                    display.classList.add('text-red-500'); triggerConfetti(); lucide.createIcons();
                }
            };

            toggleBtn.onclick = () => {
                if (isRunning) {
                    clearInterval(appState.timerInterval); isRunning = false;
                    toggleBtn.innerHTML = `<i data-lucide="play" class="w-14 h-14 fill-current ml-2"></i>`;
                    toggleBtn.className = "btn-tactile bg-crayon-green text-white w-32 h-32 rounded-full flex items-center justify-center shadow-tactile border-4 border-slate-800";
                } else {
                    if (secondsLeft === 0) { secondsLeft = totalTime || 300; display.classList.remove('text-red-500'); }
                    appState.timerInterval = setInterval(tick, 1000); isRunning = true;
                    toggleBtn.innerHTML = `<i data-lucide="pause" class="w-14 h-14 fill-current"></i>`;
                    toggleBtn.className = "btn-tactile bg-crayon-red text-white w-32 h-32 rounded-full flex items-center justify-center shadow-tactile border-4 border-slate-800";
                }
                lucide.createIcons();
            };

            window.addTime = (s) => { secondsLeft = Math.max(0, secondsLeft + s); totalTime = Math.max(totalTime, secondsLeft); updateUI(); };
            window.resetTimer = () => { clearInterval(appState.timerInterval); isRunning = false; secondsLeft = 300; totalTime = 300; toggleBtn.innerHTML = `<i data-lucide="play" class="w-14 h-14 fill-current ml-2"></i>`; toggleBtn.className = "btn-tactile bg-crayon-green text-white w-32 h-32 rounded-full flex items-center justify-center shadow-tactile border-4 border-slate-800"; display.classList.remove('text-red-500'); updateUI(); lucide.createIcons(); };
            
            window.showTimerSettings = () => {
                showModal(`
                    <h3 class="text-4xl font-display text-slate-800 mb-8 text-center" style="-webkit-text-stroke: 1px white;">Set Timer</h3>
                    <div class="flex justify-center gap-5 flex-wrap mb-6">
                        ${[1,2,5,10,15,20].map(m => `<button onclick="window.setCustomTime(${m})" class="btn-tactile w-24 h-24 rounded-2xl bg-white border-4 border-slate-800 text-slate-800 font-display text-4xl hover:bg-crayon-blue hover:text-white">${m}</button>`).join('')}
                    </div>
                `);
            };
            window.setCustomTime = (m) => { secondsLeft = m * 60; totalTime = secondsLeft; updateUI(); document.getElementById('modal-container').classList.add('hidden'); };
            updateUI();
        }

        // --- 4. ROSTER ---
        function renderClassRoster() {
            const list = appState.students.map(s => `
                <div class="bg-white border-4 border-slate-800 p-4 rounded-3xl shadow-tactile hover:shadow-cartoon hover:-translate-y-1 transition-all group flex flex-col items-center justify-center h-48 relative">
                    <div class="text-6xl mb-2 transform transition-transform group-hover:scale-110 drop-shadow-md">${getStudentEmoji(s)}</div>
                    <span class="font-bold text-xl text-slate-800 truncate w-full text-center tracking-wide">${s.name}</span>
                    <button onclick="window.removeStudent('${s.id}')" class="absolute -top-4 -right-4 p-2 bg-red-500 text-white border-4 border-slate-800 rounded-full opacity-0 group-hover:opacity-100 shadow-tactile transition-opacity hover:scale-110"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
            `).join('');

            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col p-6 animate-pop-in bg-board relative">
                    <div class="flex justify-between items-center mb-6 bg-crayon-blue p-4 rounded-3xl border-4 border-slate-800 shadow-tactile">
                        <h2 class="text-4xl font-display text-white flex items-center gap-3 drop-shadow-md"><i data-lucide="users" class="w-8 h-8"></i> Roster (${appState.students.length})</h2>
                        <button onclick="window.showAddStudentModal()" class="btn-tactile bg-crayon-green text-white px-6 py-3 rounded-2xl border-4 border-slate-800 font-bold text-xl flex items-center gap-2">Add Student</button>
                    </div>
                    <div class="flex-grow overflow-y-auto pr-2 pb-10"><div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">${list}</div></div>
                </div>
            `;
            
            window.showAddStudentModal = () => {
                showModal(`
                    <h3 class="text-3xl font-display text-slate-800 mb-6 text-center">Add New Student</h3>
                    <input type="text" id="new-student-name" class="w-full border-4 border-slate-800 shadow-[inset_0_4px_8px_rgba(0,0,0,0.1)] rounded-2xl px-6 py-4 font-bold text-2xl mb-6 focus:border-crayon-blue outline-none" placeholder="Student Name" autocomplete="off">
                    <button onclick="window.addStudent()" class="w-full btn-tactile bg-crayon-green border-4 border-slate-800 text-white py-4 rounded-2xl font-black text-2xl tracking-widest uppercase">Add to Class</button>
                `);
                setTimeout(() => document.getElementById('new-student-name').focus(), 100);
            };

            window.addStudent = async () => {
                const name = document.getElementById('new-student-name').value.trim();
                if(!name) return;
                document.getElementById('modal-container').classList.add('hidden');
                if (appState.userId) await addDoc(collection(db, `artifacts/${appId}/users/${appState.userId}/students`), { name, isPresent: true });
                else { appState.students.push({ id: `loc-${Date.now()}`, name, isPresent: true }); renderClassRoster(); }
            };
            
            window.removeStudent = async (id) => {
                if(confirm('Remove this student?')) {
                    if (appState.userId) await deleteDoc(doc(db, `artifacts/${appId}/users/${appState.userId}/students`, id));
                    else { appState.students = appState.students.filter(s => s.id !== id); renderClassRoster(); }
                }
            };
        }

        // --- 5. RANDOM PICKER ---
        function renderStudentSelector() {
            const list = appState.students.map(s => `
                <div class="flex items-center justify-between p-3 mb-2 bg-white rounded-xl border-2 border-slate-800 shadow-[2px_2px_0px_#1e293b] hover:bg-slate-50 cursor-pointer" onclick="window.toggleAttendance('${s.id}')">
                    <div class="flex items-center gap-3"><span class="text-3xl drop-shadow-sm">${getStudentEmoji(s)}</span> <span class="font-bold text-lg tracking-wide ${s.isPresent?'text-slate-800':'text-slate-400 line-through opacity-70'}">${s.name}</span></div>
                    <div class="w-14 h-8 rounded-full border-2 border-slate-800 relative transition-colors ${s.isPresent ? 'bg-crayon-green' : 'bg-slate-300'}">
                        <div class="w-6 h-6 bg-white border-2 border-slate-800 rounded-full absolute top-[2px] transition-all ${s.isPresent ? 'left-[26px]' : 'left-[2px]'}"></div>
                    </div>
                </div>
            `).join('');

            toolDisplay.innerHTML = `
                <div class="h-full flex p-4 gap-6 animate-pop-in bg-board">
                    <div class="w-80 flex-shrink-0 flex flex-col bg-white rounded-[2rem] border-4 border-slate-800 shadow-cartoon overflow-hidden h-full">
                        <div class="p-4 bg-crayon-yellow border-b-4 border-slate-800 text-center font-display text-2xl text-slate-900 shadow-sm z-10">Attendance</div>
                        <div class="overflow-y-auto flex-grow p-4 no-scrollbar bg-slate-50">${list}</div>
                    </div>
                    
                    <div class="flex-grow flex flex-col items-center justify-center p-4">
                        <div id="selector-display" class="w-full max-w-4xl h-[450px] bg-white rounded-[3rem] border-8 border-slate-800 shadow-cartoon flex flex-col items-center justify-center p-8 mb-8 relative">
                            <div id="result-content" class="text-center w-full h-full flex flex-col justify-center items-center">
                                <i data-lucide="dices" class="w-32 h-32 text-crayon-purple mb-8 opacity-40"></i>
                                <h2 class="text-6xl font-display text-slate-800" style="-webkit-text-stroke: 1px white;">Ready to Pick!</h2>
                            </div>
                        </div>
                        <div class="flex gap-5">
                            <button onclick="window.pickOne()" class="btn-tactile bg-crayon-purple border-4 border-slate-800 text-white px-10 py-5 rounded-2xl font-black text-2xl flex items-center gap-3"><i data-lucide="wand-2" class="w-8 h-8"></i> Pick One</button>
                            <button onclick="window.pickGroups(2)" class="btn-tactile bg-white border-4 border-slate-800 text-slate-800 px-8 py-5 rounded-2xl font-bold text-2xl hover:bg-crayon-yellow">Pairs</button>
                            <button onclick="window.pickGroups(4)" class="btn-tactile bg-white border-4 border-slate-800 text-slate-800 px-8 py-5 rounded-2xl font-bold text-2xl hover:bg-crayon-yellow">Groups of 4</button>
                        </div>
                    </div>
                </div>
            `;

            window.toggleAttendance = async (id) => {
                const s = appState.students.find(st => st.id === id);
                if (appState.userId) await updateDoc(doc(db, `artifacts/${appId}/users/${appState.userId}/students`, s.id), { isPresent: !s.isPresent });
                else { s.isPresent = !s.isPresent; renderStudentSelector(); }
            };

            window.pickOne = () => {
                const pool = appState.students.filter(s => s.isPresent);
                if(!pool.length) return;
                const display = document.getElementById('result-content');
                let i = 0;
                const timer = setInterval(() => {
                    const r = pool[Math.floor(Math.random() * pool.length)];
                    display.innerHTML = `<div class="opacity-50 scale-90"><div class="text-8xl mb-4 drop-shadow-md">${getStudentEmoji(r)}</div><h2 class="text-6xl font-bold text-slate-400">${r.name}</h2></div>`;
                    if (++i > 15) {
                        clearInterval(timer);
                        const win = pool[Math.floor(Math.random() * pool.length)];
                        display.innerHTML = `<div class="animate-pop-in"><div class="text-[10rem] mb-6 animate-bounce-slow drop-shadow-2xl">${getStudentEmoji(win)}</div><h2 class="text-8xl font-display text-crayon-purple" style="-webkit-text-stroke: 2px white;">${win.name}</h2></div>`;
                        triggerConfetti();
                    }
                }, 100);
            };

            window.pickGroups = (size) => {
                const pool = appState.students.filter(s => s.isPresent).sort(() => Math.random() - 0.5);
                const groups = []; while(pool.length) groups.push(pool.splice(0, size));
                const html = groups.map((g, i) => `
                    <div class="bg-white border-4 border-slate-800 rounded-2xl p-4 shadow-tactile">
                        <div class="text-center font-black text-white bg-slate-800 rounded-lg py-1 mb-3 uppercase text-sm tracking-widest border-2 border-slate-900">Group ${i+1}</div>
                        <div class="flex flex-col gap-2">${g.map(s => `<div class="bg-slate-50 border-2 border-slate-800 p-2 rounded-xl flex items-center gap-3"><span class="text-3xl">${getStudentEmoji(s)}</span><span class="font-bold text-lg">${s.name}</span></div>`).join('')}</div>
                    </div>`).join('');
                document.getElementById('result-content').innerHTML = `<div class="w-full h-full overflow-y-auto no-scrollbar grid grid-cols-2 lg:grid-cols-3 gap-5 p-2 items-start content-start">${html}</div>`;
                triggerConfetti();
            };
        }

        // --- 6. TOURNAMENT BRACKET ---
        function renderTournamentBracket() {
            if (!appState.bracket) {
                toolDisplay.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full animate-pop-in bg-board">
                        <div class="p-8 bg-white border-8 border-slate-800 shadow-cartoon rounded-[3rem] mb-10"><i data-lucide="trophy" class="w-32 h-32 text-crayon-yellow"></i></div>
                        <h2 class="text-6xl font-display text-slate-800 mb-10" style="-webkit-text-stroke: 1px white;">Class Tournament</h2>
                        <button onclick="window.genBracket()" class="btn-tactile bg-crayon-blue border-4 border-slate-800 text-white px-12 py-6 rounded-3xl font-black text-3xl flex items-center gap-4"><i data-lucide="git-branch" class="w-8 h-8"></i> Create Bracket</button>
                    </div>`;
                return;
            }

            const renderMatch = (m) => {
                const p1 = m.players[0], p2 = m.players[1], wId = m.winner?.id;
                const rP = (p) => {
                    if(!p) return '<div class="h-14 bg-slate-100 border-2 border-slate-300 rounded-xl mb-1 flex items-center px-4"><span class="text-slate-400 font-bold">TBD</span></div>';
                    if(p.id === 'bye') return '<div class="h-14 flex items-center px-4 border-2 border-transparent"><span class="text-slate-400 font-bold opacity-50">BYE</span></div>';
                    const isW = wId === p.id, isL = wId && wId !== p.id, canClick = !wId;
                    return `
                        <div ${canClick ? `onclick="window.advBracket('${m.id}', '${p.id}')"` : ''} 
                             class="h-14 flex items-center px-4 rounded-xl border-4 mb-1 cursor-pointer transition-all select-none
                             ${isW ? 'bg-crayon-green border-slate-800 text-white font-black shadow-sm' : isL ? 'bg-slate-100 border-slate-300 text-slate-400 opacity-60' : 'bg-white border-slate-800 hover:bg-crayon-yellow text-slate-800 font-bold shadow-tactile'}">
                             <span class="text-3xl mr-3 drop-shadow-sm">${getStudentEmoji(p)}</span><span class="truncate text-xl">${p.name}</span>
                        </div>`;
                };
                return `<div class="w-[320px] bg-white p-3 rounded-2xl border-4 border-slate-800 shadow-tactile mb-8 relative">
                           <div class="absolute -left-6 top-1/2 w-6 h-2 bg-slate-800"></div>
                           ${rP(p1)}<div class="h-1 bg-slate-800 my-2 rounded-full"></div>${rP(p2)}
                        </div>`;
            };

            const wbMatches = appState.bracket.matches.filter(m => m.type === 'winner' || m.type === 'final');
            
            toolDisplay.innerHTML = `
                <div class="h-full flex flex-col bg-board">
                    <div class="p-4 bg-crayon-yellow border-b-4 border-slate-800 flex justify-between items-center z-10 shadow-sm">
                        <h2 class="font-display text-3xl text-slate-900 flex items-center gap-3"><i data-lucide="trophy" class="w-8 h-8"></i> Tournament</h2>
                        <button onclick="appState.bracket=null;renderTournamentBracket()" class="text-white font-bold btn-tactile px-6 py-2 bg-red-500 border-4 border-slate-800 rounded-xl hover:bg-red-600">Reset Bracket</button>
                    </div>
                    <div class="flex-grow overflow-auto p-10 custom-scrollbar">
                        <div class="flex gap-16 min-w-max">
                            <div class="flex flex-col gap-4">
                                <h3 class="font-black text-slate-800 bg-white border-4 border-slate-800 px-6 py-2 rounded-xl w-max tracking-widest text-lg mb-6 shadow-tactile uppercase">Quarterfinals</h3>
                                ${wbMatches.map(m => renderMatch(m)).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            window.genBracket = () => {
                const pool = appState.students.filter(s => s.isPresent).sort(()=>Math.random()-0.5);
                if(pool.length < 2) return alert("Need more students!");
                const matches = []; let size=2; while(size<pool.length) size*=2;
                while(pool.length < size) pool.push({id:'bye', name:'BYE'});
                
                for(let i=0; i<size/2; i++) matches.push({ id:`M${i+1}`, type:'winner', players:[pool[i], pool[size-1-i]], winner:null });
                appState.bracket = { matches };
                
                matches.forEach(m => { if(m.players[1].id==='bye') window.advBracket(m.id, m.players[0].id, true); });
                renderTournamentBracket();
            };

            window.advBracket = (mId, wId, silent=false) => {
                const m = appState.bracket.matches.find(x => x.id === mId);
                if(!m || m.winner) return;
                m.winner = m.players.find(p => p.id === wId);
                if(!silent) { triggerConfetti(); renderTournamentBracket(); }
            };
        }

        // --- Helpers ---
        function triggerConfetti() {
            for(let i=0; i<40; i++) {
                const c = document.createElement('div');
                c.className = 'fixed w-5 h-5 rounded-md border-2 border-slate-800 z-[100] pointer-events-none';
                c.style.backgroundColor = ['#f59e0b', '#dc2626', '#3b82f6', '#22c55e', '#a855f7'][Math.floor(Math.random()*5)];
                c.style.left = (Math.random() * 100) + 'vw'; c.style.top = '-20px';
                document.body.appendChild(c);
                const anim = c.animate([{ transform: `translateY(0) rotate(0) scale(1)`, opacity: 1 }, { transform: `translateY(100vh) rotate(720deg) scale(0.5)`, opacity: 1 }], { duration: 1500 + Math.random()*1500, easing: 'ease-in-out' });
                anim.onfinish = () => c.remove();
            }
        }

        function setupFullscreen() {
            document.getElementById('fullscreen-btn').onclick = () => {
                if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
                else document.exitFullscreen();
            };
        }

        init();
    </script>
</body>
</html>
